  const [rivalry,  setRivalry]  = useState("");
  const [quarter,  setQuarter]  = useState(PERIODS[0]);
  const [running,  setRunning]  = useState(false);
  const [timeLeft, setTimeLeft] = useState(QUARTER_SECONDS);
  const [events,   setEvents]   = useState([]);
  const [expanded, setExpanded] = useState(null); // {evId, phase:"side"|"sub"}
  const [selSide,  setSelSide]  = useState(null);
  const [matchId]               = useState(generateId);

  useEffect(()=>{
    if (!running) return;
    const t = setInterval(()=>{
      setTimeLeft(v=>{
        if (v > 1) return v-1;
        clearInterval(t);
        setRunning(false);
        setQuarter(q => {
          const idx = PERIODS.indexOf(q);
          return idx < PERIODS.length-1 ? PERIODS[idx+1] : q;
        });
        return QUARTER_SECONDS;
      });
    },1000);
    return ()=>clearInterval(t);
  },[running]);

  const minute = Math.ceil((QUARTER_SECONDS-timeLeft)/60)||1;
  const timerColor = timeLeft<=60?"#EF4444":timeLeft<=180?"#FBBF24":p.text;

  const handleEvClick = evId => {
    if (expanded && expanded.evId===evId) { setExpanded(null); setSelSide(null); return; }
    setExpanded({evId, phase:"side"});
    setSelSide(null);
  };

  const handleSide = side => {
    const evId = expanded.evId;
    const needsSub = ["ingreso_area","tiro_arco","gol"].includes(evId);
    if (needsSub) {
      setSelSide(side);
      setExpanded({evId, phase:"sub"});
    } else {
      const ev = EVENT_TYPES.find(e=>e.id===evId);
      setEvents(evs=>[{id:generateId(),type:evId,label:ev.label,side,minute,quarter},...evs]);
      setExpanded(null); setSelSide(null);
    }
  };

  const handleSub = subData => {
    const ev = EVENT_TYPES.find(e=>e.id===expanded.evId);
    setEvents(evs=>[{id:generateId(),type:expanded.evId,label:ev.label,side:selSide,minute,quarter,...subData},...evs]);
    setExpanded(null); setSelSide(null);
  };

  const [matchNotes, setMatchNotes] = useState("");
  const [showFinish,  setShowFinish]  = useState(false);

  const finishMatch = () => {
    const match = {id:matchId,clubId:club.id,teamId:team.id,rival:rivalry||"Rival",date:new Date().toLocaleDateString("es-AR"),events,notes:matchNotes.trim()};
    onUpdateData({...data, matches:[match,...data.matches]});
    onBack();
  };

  if (step==="setup") {
    return (
      <div style={{padding:sz(24),maxWidth:600,margin:"0 auto"}}>
        <Header title="Nuevo Partido" onBack={onBack}/>
        <div style={{display:"flex",flexDirection:"column",gap:sz(16)}}>
          <div>
            <label style={{color:p.mutedHi,fontSize:sz(13),fontWeight:600,display:"block",marginBottom:sz(6)}}>RIVAL</label>
            <input value={rivalry} onChange={e=>setRivalry(e.target.value)} placeholder="Nombre del rival" style={{background:p.card,border:"1px solid "+p.border,borderRadius:sz(10),color:p.text,padding:""+sz(12)+"px "+sz(14)+"px",fontSize:sz(14),outline:"none",width:"100%",boxSizing:"border-box"}}/>
          </div>
          <div>
            <div style={{color:p.mutedHi,fontSize:sz(13),fontWeight:600,marginBottom:sz(8)}}>CUARTO INICIAL</div>
            <div style={{display:"flex",gap:sz(6)}}>
              {PERIODS.map(q=>(
                <button key={q} onClick={()=>setQuarter(q)} style={{flex:1,background:quarter===q?ac+"22":p.card,border:"1px solid "+(quarter===q?ac:p.border),borderRadius:sz(8),padding:""+sz(10)+"px "+sz(4)+"px",cursor:"pointer",color:quarter===q?ac:p.mutedLo,fontWeight:700,fontSize:sz(11)}}>C{PERIODS.indexOf(q)+1}</button>
              ))}
            </div>
          </div>
          <button onClick={()=>setStep("register")} style={{background:ac,border:"none",borderRadius:sz(12),padding:sz(14),color:"#fff",fontWeight:800,fontSize:sz(15),cursor:"pointer"}}>Iniciar Partido</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{padding:sz(16),maxWidth:600,margin:"0 auto"}}>

      {/* HEADER: back + timer + play/pause */}
      <div style={{display:"flex",alignItems:"center",gap:sz(10),marginBottom:sz(10)}}>
        <button onClick={onBack} style={{background:p.border,border:"none",color:p.mutedHi,borderRadius:sz(8),width:sz(36),height:sz(36),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>&#8249;</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:sz(38),fontWeight:900,color:timerColor,fontVariantNumeric:"tabular-nums",lineHeight:1}}>{formatTime(timeLeft)}</div>
          <div style={{color:p.muted,fontSize:sz(15),marginTop:sz(3),fontWeight:600}}>{rivalry||"vs Rival"}</div>
        </div>
        <button onClick={()=>setRunning(r=>!r)} style={{background:running?"#EF444433":ac+"33",border:"1px solid "+(running?"#EF444460":ac+"60"),borderRadius:sz(8),width:sz(36),height:sz(36),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {running
            ? <svg width={sz(16)} height={sz(16)} viewBox="0 0 24 24" fill="none"><rect x="5" y="4" width="4" height="16" rx="1.5" fill={"#EF4444"}/><rect x="15" y="4" width="4" height="16" rx="1.5" fill={"#EF4444"}/></svg>
            : <svg width={sz(16)} height={sz(16)} viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21" fill={ac}/></svg>
          }
        </button>
      </div>

      {/* QUARTERS arriba */}
      <div style={{display:"flex",gap:sz(4),marginBottom:sz(14),background:p.tab,borderRadius:sz(10),padding:3}}>
        {PERIODS.map(q=>(
          <button key={q} onClick={()=>setQuarter(q)} style={{flex:1,padding:""+sz(7)+"px "+sz(4)+"px",borderRadius:sz(8),border:"none",cursor:"pointer",fontWeight:700,fontSize:sz(12),background:quarter===q?ac+"33":"transparent",color:quarter===q?ac:p.mutedLo}}>
            C{PERIODS.indexOf(q)+1}
          </button>
        ))}
      </div>

      {/* EVENT LIST - desplegable inline */}
      <div style={{display:"flex",flexDirection:"column",gap:sz(5),marginBottom:sz(14)}}>
        {EVENT_TYPES.map(ev=>{
          const isOpen   = expanded && expanded.evId===ev.id;
          const phase    = isOpen ? expanded.phase : null;
          const needsSub = ["ingreso_area","tiro_arco","gol"].includes(ev.id);
          const subTypes = ev.id==="ingreso_area"?INGRESS_TYPES:ev.id==="gol"?GOL_TYPES:SHOT_TYPES;
          const fk = ev.id==="ingreso_area"?"ingressType":ev.id==="gol"?"golType":"shotType";
          const lk = ev.id==="ingreso_area"?"ingressLabel":ev.id==="gol"?"golLabel":"shotLabel";
          return (
            <div key={ev.id} style={{borderRadius:sz(11),overflow:"hidden",border:"1px solid "+(isOpen?ev.color+"60":p.border)}}>
              <button onClick={()=>handleEvClick(ev.id)}
                style={{width:"100%",background:isOpen?ev.color+"18":p.card,border:"none",padding:""+sz(11)+"px "+sz(14)+"px",display:"flex",alignItems:"center",gap:sz(12),cursor:"pointer",textAlign:"left"}}>
                <div style={{width:sz(34),height:sz(34),borderRadius:sz(8),background:ev.color+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:"1px solid "+ev.color+"44"}}>
                  <SvgIcon id={ev.id} size={sz(17)} color={ev.color}/>
                </div>
                <span style={{flex:1,fontWeight:600,color:isOpen?ev.color:p.textSub,fontSize:sz(14)}}>{ev.label}</span>
                <span style={{color:isOpen?ev.color:p.borderSt,fontSize:sz(17),display:"inline-block",transform:isOpen?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s"}}>&#8250;</span>
              </button>

              {isOpen && phase==="side" && (
                <div style={{background:p.cardAlt,borderTop:"1px solid "+ev.color+"30",padding:sz(8),display:"flex",gap:sz(8)}}>
                  <button onClick={()=>handleSide("own")}
                    style={{flex:1,background:ac+"22",border:"2px solid "+ac,borderRadius:sz(9),padding:""+sz(9)+"px "+sz(8)+"px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:sz(6)}}>
                    <svg width={sz(14)} height={sz(14)} viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke={ac} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <span style={{fontWeight:800,fontSize:sz(13),color:ac}}>A FAVOR</span>
                  </button>
                  <button onClick={()=>handleSide("rival")}
                    style={{flex:1,background:"#EF444422",border:"2px solid #EF4444",borderRadius:sz(9),padding:""+sz(9)+"px "+sz(8)+"px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:sz(6)}}>
                    <svg width={sz(14)} height={sz(14)} viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#EF4444" strokeWidth="2.5" strokeLinecap="round"/></svg>
                    <span style={{fontWeight:800,fontSize:sz(13),color:"#EF4444"}}>EN CONTRA</span>
                  </button>
                </div>
              )}

              {isOpen && phase==="sub" && needsSub && (
                <div style={{background:p.cardAlt,borderTop:"1px solid "+ev.color+"30",padding:sz(8)}}>
                  <div style={{color:p.mutedLo,fontSize:sz(10),fontWeight:700,marginBottom:sz(6),paddingLeft:sz(2)}}>
                    {ev.id==="ingreso_area"?"TIPO DE INGRESO":ev.id==="gol"?"ORIGEN DEL GOL":"ORIGEN DEL TIRO"}
                    <span style={{marginLeft:sz(5),color:selSide==="own"?ac:"#EF4444"}}>{selSide==="own"?" / a favor":" / en contra"}</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:sz(5)}}>
                    {subTypes.map(t=>(
                      <button key={t.id} onClick={()=>handleSub({[fk]:t.id,[lk]:t.label})}
                        style={{background:p.card,border:"1px solid "+p.border,borderRadius:sz(8),padding:""+sz(9)+"px "+sz(12)+"px",display:"flex",alignItems:"center",gap:sz(10),cursor:"pointer",width:"100%",textAlign:"left"}}>
                        <div style={{width:sz(26),height:sz(26),borderRadius:sz(6),background:ev.color+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          <SvgIcon id={t.id} size={sz(13)} color={ev.color}/>
                        </div>
                        <span style={{fontWeight:600,color:p.text,fontSize:sz(13),flex:1}}>{t.label}</span>
                        <span style={{color:p.borderSt,fontSize:sz(15)}}>&#8250;</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* EVENTOS REGISTRADOS */}
      {events.length>0 && (
        <div style={{marginBottom:sz(14)}}>
          <div style={{color:p.mutedHi,fontSize:sz(11),fontWeight:700,letterSpacing:1,marginBottom:sz(7)}}>EVENTOS REGISTRADOS ({events.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:sz(4)}}>
            {events.slice(0,5).map(ev=>{
              const et = EVENT_TYPES.find(e=>e.id===ev.type);
              return (
                <div key={ev.id} style={{background:p.card,border:"1px solid "+p.border,borderRadius:sz(8),padding:""+sz(8)+"px "+sz(12)+"px",display:"flex",alignItems:"center",gap:sz(9)}}>
                  <div style={{width:sz(26),height:sz(26),borderRadius:sz(6),background:(et?.color||ac)+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <SvgIcon id={ev.type} size={sz(13)} color={et?.color||ac}/>
                  </div>
                  <span style={{color:p.text,fontWeight:600,fontSize:sz(12),flex:1}}>{et?.label}{ev.ingressLabel?" / "+ev.ingressLabel:ev.golLabel?" / "+ev.golLabel:ev.shotLabel?" / "+ev.shotLabel:""}</span>
                  <span style={{color:ev.side==="own"?ac:"#EF4444",fontSize:sz(10),fontWeight:700,marginRight:sz(4)}}>{ev.side==="own"?"FAV":"CON"}</span>
                  <span style={{color:p.mutedLo,fontSize:sz(10)}}>{ev.minute}' C{PERIODS.indexOf(ev.quarter)+1}</span>
                </div>
              );
            })}
            {events.length>5 && <div style={{color:p.mutedLo,fontSize:sz(10),textAlign:"center",padding:sz(3)}}>+{events.length-5} anteriores</div>}
          </div>
        </div>
      )}

      {showFinish ? (
        <div style={{background:p.card,border:"1px solid "+p.border,borderRadius:sz(12),padding:sz(14)}}>
          <div style={{color:p.mutedHi,fontSize:sz(12),fontWeight:700,marginBottom:sz(8)}}>NOTAS DEL PARTIDO (opcional)</div>
          <textarea value={matchNotes} onChange={e=>setMatchNotes(e.target.value)}
            placeholder="Observaciones tacticas, rendimiento, clima, etc..."
            rows={3}
            style={{width:"100%",background:p.cardAlt,border:"1px solid "+p.border,borderRadius:sz(8),color:p.text,padding:sz(10),fontSize:sz(13),outline:"none",resize:"none",boxSizing:"border-box",fontFamily:"inherit"}}
          />
          <div style={{display:"flex",gap:sz(8),marginTop:sz(10)}}>
            <button onClick={()=>setShowFinish(false)} style={{flex:1,background:p.borderSt,border:"none",borderRadius:sz(10),padding:sz(12),color:p.text,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
            <button onClick={finishMatch} style={{flex:2,background:"#EF4444",border:"none",borderRadius:sz(10),padding:sz(12),color:"#fff",fontWeight:800,cursor:"pointer"}}>Confirmar y Guardar</button>
          </div>
        </div>
      ) : (
        <button onClick={()=>setShowFinish(true)} style={{width:"100%",background:"#EF4444",border:"none",borderRadius:sz(12),padding:sz(13),color:"#fff",fontWeight:800,fontSize:sz(15),cursor:"pointer"}}>Finalizar Partido</button>
      )}
    </div>
  );
}

function HistoryView({data, club, team, onBack, onDeleteMatch, sheetsUrl, syncMatch, syncStatus, onSheetsUrlChange, onUpdateData}) {
  const {p, ac, fs} = useTheme();
  const sz = n => Math.round(n*fs);
  const [openMatch,    setOpenMatch]    = useState(null);
  const [openTimeline, setOpenTimeline] = useState({});
  const [activeQ,      setActiveQ]      = useState({});
  const [activeTour,   setActiveTour]   = useState("all");
  const [urlLocked,    setUrlLocked]    = useState(!!sheetsUrl);
  const [editMatch,    setEditMatch]    = useState(null);
  const [compareList,  setCompareList]  = useState([]); // matchIds selected for compare
  const [showCompare,  setShowCompare]  = useState(false);
  const tournaments = getTeamTournaments(data, club.id, team.id);

  const shareMatch = (match, club, team, tournaments) => {
    const evs    = match.events||[];
    const PERIODS = ["1er Cuarto","2do Cuarto","3er Cuarto","4to Cuarto"];
    const og = evs.filter(e=>e.type==="gol"&&e.side==="own").length;
    const rg = evs.filter(e=>e.type==="gol"&&e.side==="rival").length;
    const result = og>rg?"GANADO":og===rg?"EMPATE":"PERDIDO";
    const tourName = tournaments.find(t=>t.id===match.tournamentId)?.name||"";

    const count = (type,side,q,sf,sv) => {
      let f=evs.filter(e=>e.type===type&&e.side===side);
      if(sf&&sv) f=f.filter(e=>e[sf]===sv);
      if(q!==null) f=f.filter(e=>e.quarter===PERIODS[q]);
      return f.length;
    };

    const ROWS = [
      {label:"Ingresos a favor",   type:"ingreso_area",side:"own",  subs:[{l:"Centro",sf:"ingressType",sv:"centro"},{l:"Combinacion",sf:"ingressType",sv:"combinacion"},{l:"Desborde",sf:"ingressType",sv:"desborde"},{l:"Individual",sf:"ingressType",sv:"individual"}]},
      {label:"Ingresos en contra", type:"ingreso_area",side:"rival",subs:[{l:"Centro",sf:"ingressType",sv:"centro"},{l:"Combinacion",sf:"ingressType",sv:"combinacion"},{l:"Desborde",sf:"ingressType",sv:"desborde"},{l:"Individual",sf:"ingressType",sv:"individual"}]},
      {label:"Tiros a favor",      type:"tiro_arco",   side:"own",  subs:[{l:"Jugada",sf:"shotType",sv:"jugada"},{l:"Corner",sf:"shotType",sv:"corner"},{l:"Rebote",sf:"shotType",sv:"rebote"},{l:"Desvio",sf:"shotType",sv:"desvio"}]},
      {label:"Tiros en contra",    type:"tiro_arco",   side:"rival",subs:[{l:"Jugada",sf:"shotType",sv:"jugada"},{l:"Corner",sf:"shotType",sv:"corner"},{l:"Rebote",sf:"shotType",sv:"rebote"},{l:"Desvio",sf:"shotType",sv:"desvio"}]},
      {label:"Corners a favor",    type:"corner",side:"own",  subs:[]},
      {label:"Corners en contra",  type:"corner",side:"rival",subs:[]},
      {label:"Goles a favor",      type:"gol",   side:"own",  subs:[{l:"Jugada",sf:"golType",sv:"jugada"},{l:"Corner",sf:"golType",sv:"corner"},{l:"Penal",sf:"golType",sv:"penal"}]},
      {label:"Goles en contra",    type:"gol",   side:"rival",subs:[{l:"Jugada",sf:"golType",sv:"jugada"},{l:"Corner",sf:"golType",sv:"corner"},{l:"Penal",sf:"golType",sv:"penal"}]},
      {label:"Penales a favor",    type:"penal", side:"own",  subs:[]},
      {label:"Penales en contra",  type:"penal", side:"rival",subs:[]},
      {label:"Tarjetas verdes",    type:"tarjeta_verde",   side:"own",subs:[]},
      {label:"Tarjetas amarillas", type:"tarjeta_amarilla",side:"own",subs:[]},
      {label:"Tarjetas rojas",     type:"tarjeta_roja",    side:"own",subs:[]},
    ];

    // Build canvas image
    const SCALE = 2;
    const canvas = document.createElement("canvas");
    const W = 960, ROW_H = 28, SUB_H = 22;
    const totalRows = ROWS.reduce((a,r)=>a+1+r.subs.length,0);
    const H = 180 + totalRows*(ROW_H) + 40;
    canvas.width = W*SCALE; canvas.height = H*SCALE;
    const ctx = canvas.getContext("2d");
    ctx.scale(SCALE,SCALE);

    const BG    = "#020817";
    const CARD  = "#0f172a";
    const CARD2 = "#1e293b";
    const TEXT  = "#e2e8f0";
    const MUTED = "#94a3b8";
    const GREEN = "#00C896";
    const RED   = "#EF4444";
    const BLUE  = "#3B9EFF";

    ctx.fillStyle = BG;
    ctx.fillRect(0,0,W,H);

    // Header
    ctx.fillStyle = CARD2;
    ctx.fillRect(0,0,W,160);

    // Result badge
    const rc = result==="GANADO"?GREEN:result==="EMPATE"?"#FBBF24":RED;
    ctx.fillStyle = rc+"33";
    ctx.beginPath(); ctx.roundRect(24,20,80,44,8); ctx.fill();
    ctx.fillStyle = rc;
    ctx.font = "bold 22px 'DM Sans',sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(result, 64, 48);

    // Score
    ctx.fillStyle = TEXT;
    ctx.font = "bold 48px 'DM Sans',sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(og+" - "+rg, W/2, 60);

    // Rival
    ctx.fillStyle = MUTED;
    ctx.font = "18px 'DM Sans',sans-serif";
    ctx.fillText("vs  "+match.rival, W/2, 90);

    // Team & date
    ctx.fillStyle = MUTED;
    ctx.font = "14px 'DM Sans',sans-serif";
    ctx.fillText(team.name+(tourName?" · "+tourName:"")+" · "+match.date, W/2, 118);

    // Watermark
    ctx.fillStyle = GREEN+"80";
    ctx.font = "bold 12px 'DM Sans',sans-serif";
    ctx.fillText("Live Tracker", W/2, 145);

    // Column headers
    let y = 170;
    ctx.fillStyle = "#334155";
    ctx.fillRect(0, y, W, 26);
    ctx.fillStyle = MUTED;
    ctx.font = "bold 11px 'DM Sans',sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("ESTADÍSTICA", 16, y+17);
    ["C1","C2","C3","C4","TOTAL"].forEach((h,i)=>{
      ctx.textAlign = "center";
      ctx.fillText(h, W-280+(i*56), y+17);
    });
    y += 26;

    // Rows
    ROWS.forEach((row,ri) => {
      const bg = ri%2===0?CARD:CARD2;
      ctx.fillStyle = bg;
      ctx.fillRect(0, y, W, ROW_H);

      // Label
      ctx.fillStyle = TEXT;
      ctx.font = "bold 12px 'DM Sans',sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(row.label, 16, y+ROW_H/2+4);

      // Values C1-C4 + Total
      [0,1,2,3,null].forEach((q,i) => {
        const v = count(row.type,row.side,q,null,null);
        ctx.fillStyle = v>0?(row.side==="own"?GREEN:RED):MUTED;
        ctx.font = "bold 13px 'DM Sans',sans-serif";
        ctx.textAlign = "center";
        // Total column gets highlighted bg
        if(i===4){
          ctx.fillStyle = GREEN+"18";
          ctx.fillRect(W-56-8, y+2, 56, ROW_H-4);
        }
        ctx.fillStyle = v>0?(i===4?GREEN:row.side==="own"?GREEN:RED):MUTED;
        ctx.fillText(v, W-280+(i*56), y+ROW_H/2+4);
      });
      y += ROW_H;

      // Subrows
      row.subs.forEach(sub => {
        ctx.fillStyle = "#0d1929";
        ctx.fillRect(0, y, W, SUB_H);
        ctx.fillStyle = "#475569";
        ctx.font = "italic 11px 'DM Sans',sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("  · "+sub.l, 28, y+SUB_H/2+4);
        [0,1,2,3,null].forEach((q,i) => {
          const v = count(row.type,row.side,q,sub.sf,sub.sv);
          ctx.fillStyle = v>0?"#64748b":"#334155";
          ctx.font = "11px 'DM Sans',sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(v, W-280+(i*56), y+SUB_H/2+4);
        });
        y += SUB_H;
      });
    });

    // Download HD
    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const link=document.createElement("a");
      link.download="partido-"+match.rival.replace(/[^a-zA-Z0-9]/g,"-")+"-"+match.date.replace(/[^0-9]/g,"-")+".png";
      link.href=url; link.click();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    },"image/png");
  };
  const allMatches  = data.matches.filter(m=>m.teamId===team.id&&m.clubId===club.id);
  const matches     = activeTour==="all" ? allMatches : allMatches.filter(m=>m.tournamentId===activeTour);

  const assignTournament = (matchId, tourId) => {
    const updated = data.matches.map(m=>m.id===matchId?{...m,tournamentId:tourId||null}:m);
    onUpdateData({...data, matches:updated});
  };

  const toggleCompare = (matchId) => {
    setCompareList(prev => {
      if (prev.includes(matchId)) return prev.filter(id=>id!==matchId);
      if (prev.length >= 3) return prev;
      return [...prev, matchId];
    });
  };

  const addEditEvent = (matchId, type, side, quarter, subField, subVal) => {
    const ev = {
      id: generateId(),
      type, side, quarter,
      minute: 0,
      ...(subField && subVal ? {[subField]: subVal} : {})
    };
    const updated = data.matches.map(m=>m.id===matchId?{...m,events:[...(m.events||[]),ev]}:m);
    onUpdateData({...data, matches:updated});
  };

  const removeEditEvent = (matchId, type, side, quarter, subField, subVal) => {
    // Remove the last event matching the criteria
    const match = data.matches.find(m=>m.id===matchId);
    if (!match) return;
    const evs = [...(match.events||[])];
    // Find last matching event
    let lastIdx = -1;
    for (let i=evs.length-1; i>=0; i--) {
      const e = evs[i];
      if (e.type===type && e.side===side && e.quarter===quarter) {
        if (!subField || e[subField]===subVal) { lastIdx=i; break; }
      }
    }
    if (lastIdx === -1) return;
    evs.splice(lastIdx, 1);
    const updated = data.matches.map(m=>m.id===matchId?{...m,events:evs}:m);
    onUpdateData({...data, matches:updated});
  };

  const toggle = id => setOpenMatch(prev=>prev===id?null:id);
  const toggleTimeline = id => setOpenTimeline(prev=>({...prev,[id]:!prev[id]}));
  const getQ = id => activeQ[id]||"todo";
  const setQ = (id,q) => setActiveQ(prev=>({...prev,[id]:q}));

  if (matches.length===0) {
    return (
      <div style={{padding:sz(24),maxWidth:600,margin:"0 auto"}}>
        <Header title="Historial" onBack={onBack}/>
        <p style={{color:p.mutedLo,textAlign:"center",padding:""+sz(48)+"px 0"}}>No hay partidos registrados.</p>
      </div>
    );
  }

  return (
    <div>
    <div style={{padding:sz(24),maxWidth:600,margin:"0 auto"}}>
      <Header title="Historial de Partidos" onBack={onBack}/>
      <div style={{color:p.muted,fontSize:sz(12),marginBottom:sz(10)}}>{club.name} &middot; {team.name} &middot; {allMatches.length} partido{allMatches.length!==1?"s":""}</div>
      {tournaments.length>0 && (
        <div style={{display:"flex",gap:sz(4),marginBottom:sz(12),overflowX:"auto",paddingBottom:2}}>
          {[{id:"all",name:"Todos"},...tournaments].map(tr=>(
            <button key={tr.id} onClick={()=>setActiveTour(tr.id)}
              style={{background:activeTour===tr.id?"#A78BFA33":"transparent",border:"1px solid "+(activeTour===tr.id?"#A78BFA60":p.border),borderRadius:sz(20),padding:""+sz(5)+"px "+sz(12)+"px",cursor:"pointer",fontWeight:700,fontSize:sz(11),color:activeTour===tr.id?"#A78BFA":p.mutedLo,whiteSpace:"nowrap",flexShrink:0}}>
              {tr.name}
            </button>
          ))}
        </div>
      )}
      <div style={{marginBottom:sz(16),background:p.card,border:"1px solid "+(urlLocked&&sheetsUrl?"#00C89640":p.border),borderRadius:sz(10),padding:sz(12)}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:sz(6)}}>
          <div style={{color:p.mutedHi,fontSize:sz(11),fontWeight:700}}>URL DEL SCRIPT DE GOOGLE SHEETS</div>
          {sheetsUrl && (
            <button onClick={()=>setUrlLocked(l=>!l)} style={{background:urlLocked?"#00C89620":"#FBBF2420",border:"1px solid "+(urlLocked?"#00C89650":"#FBBF2450"),borderRadius:sz(6),padding:""+sz(3)+"px "+sz(8)+"px",cursor:"pointer",color:urlLocked?"#00C896":"#FBBF24",fontSize:sz(10),fontWeight:700}}>
              {urlLocked?"✓ Bloqueado — Editar":"Guardar y bloquear"}
            </button>
          )}
        </div>
        {urlLocked && sheetsUrl
          ? <div style={{background:p.cardAlt,border:"1px solid "+p.border,borderRadius:sz(8),padding:""+sz(8)+"px "+sz(10)+"px",fontSize:sz(12),color:p.mutedHi,wordBreak:"break-all"}}>{sheetsUrl.slice(0,48)}...</div>
          : <input
              value={sheetsUrl} onChange={e=>onSheetsUrlChange(e.target.value)}
              placeholder="Pegá acá la URL del Apps Script..."
              style={{background:p.cardAlt,border:"1px solid "+p.border,borderRadius:sz(8),color:p.text,padding:""+sz(8)+"px "+sz(10)+"px",fontSize:sz(12),outline:"none",width:"100%",boxSizing:"border-box"}}
            />
        }
        {!sheetsUrl && <div style={{color:p.mutedLo,fontSize:sz(10),marginTop:sz(4)}}>Pegá la URL y tocá "Guardar y bloquear"</div>}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:sz(8)}}>
        {matches.map(match=>{
          const evs    = match.events||[];
          const og     = evs.filter(e=>e.type==="gol"&&e.side==="own").length;
          const rg     = evs.filter(e=>e.type==="gol"&&e.side==="rival").length;
          const result = og>rg?"G":og===rg?"E":"P";
          const rc     = result==="G"?ac:result==="E"?"#FBBF24":"#EF4444";
          const isOpen = openMatch===match.id;
          const showTL = !!openTimeline[match.id];
          const q      = getQ(match.id);
          const tlEvs  = q==="todo"?evs:evs.filter(e=>e.quarter===PERIODS[parseInt(q[1])-1]);

          // totals helper
          const own   = type => evs.filter(e=>e.type===type&&e.side==="own").length;
          const rival = type => evs.filter(e=>e.type===type&&e.side==="rival").length;
          const hasCards = own("tarjeta_verde")+own("tarjeta_amarilla")+own("tarjeta_roja")>0;

          return (
            <div key={match.id} style={{borderRadius:sz(14),overflow:"hidden",border:"1px solid "+(isOpen?ac+"50":p.border)}}>

              {/* Fila principal */}
              <div style={{background:isOpen?p.hover:p.card,padding:""+sz(13)+"px "+sz(16)+"px",display:"flex",alignItems:"center",gap:sz(12)}}>
                <div style={{width:sz(36),height:sz(36),borderRadius:sz(8),background:rc+"22",border:"1px solid "+rc+"44",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:sz(16),color:rc,flexShrink:0}}>{result}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,color:p.text,fontSize:sz(15)}}>{og} - {rg} &middot; {match.rival}</div>
                  <div style={{display:"flex",alignItems:"center",gap:sz(6),marginTop:sz(2),flexWrap:"wrap"}}>
                    <span style={{color:p.muted,fontSize:sz(12)}}>{match.date}</span>
                    {tournaments.length>0 && (
                      <select value={match.tournamentId||""} onChange={e=>assignTournament(match.id,e.target.value)}
                        style={{background:p.cardAlt,border:"1px solid "+p.border,borderRadius:sz(6),color:match.tournamentId?"#A78BFA":p.mutedLo,fontSize:sz(11),padding:"1px "+sz(4)+"px",cursor:"pointer",outline:"none"}}>
                        <option value="">Sin torneo</option>
                        {tournaments.map(tr=><option key={tr.id} value={tr.id}>{tr.name}</option>)}
                      </select>
                    )}
                  </div>
                </div>
                <div style={{display:"flex",gap:sz(6),alignItems:"center"}}>
                  <button onClick={()=>toggle(match.id)}
                    style={{background:isOpen?ac+"22":p.border,border:"1px solid "+(isOpen?ac+"60":p.borderSt),color:isOpen?ac:p.mutedHi,borderRadius:sz(8),padding:""+sz(6)+"px "+sz(10)+"px",cursor:"pointer",fontSize:sz(12),fontWeight:700,display:"flex",alignItems:"center",gap:sz(4)}}>
                    <SvgIcon id="stats" size={sz(13)} color={isOpen?ac:p.mutedHi}/>
                    Stats
                  </button>
                  {(()=>{
                    const st = syncStatus[match.id];
                    const syncColor = st==="ok"?"#00C896":st==="error"?"#EF4444":st==="syncing"?"#FBBF24":"#A78BFA";
                    const syncLabel = st==="ok"?"Sincronizado":st==="error"?"Error":st==="syncing"?"...":"Sheets";
                    return (
                      <button onClick={()=>syncMatch(match)}
                        style={{background:syncColor+"22",border:"1px solid "+syncColor+"60",color:syncColor,borderRadius:sz(8),padding:""+sz(6)+"px "+sz(10)+"px",cursor:"pointer",fontSize:sz(12),fontWeight:700,display:"flex",alignItems:"center",gap:sz(4),flexShrink:0}}>
                        <svg width={sz(13)} height={sz(13)} viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 018-8 8 8 0 016.93 4M20 12a8 8 0 01-8 8 8 8 0 01-6.93-4" stroke={syncColor} strokeWidth="2" strokeLinecap="round"/><path d="M15 4l2.5 2.5L15 9M9 20l-2.5-2.5L9 15" stroke={syncColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        {syncLabel}
                      </button>
                    );
                  })()}
                  {(() => {
                    const isComp = compareList.includes(match.id);
                    return (
                      <button onClick={()=>toggleCompare(match.id)}
                        style={{background:isComp?"#A78BFA33":"#A78BFA10",border:"1px solid "+(isComp?"#A78BFA80":"#A78BFA30"),borderRadius:sz(8),width:sz(32),height:sz(32),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <svg width={sz(14)} height={sz(14)} viewBox="0 0 24 24" fill="none"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke="#A78BFA" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      </button>
                    );
                  })()}
                  <button onClick={()=>shareMatch(match, club, team, tournaments)}
                    style={{background:"#3B9EFF20",border:"1px solid #3B9EFF40",borderRadius:sz(8),width:sz(32),height:sz(32),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <svg width={sz(14)} height={sz(14)} viewBox="0 0 24 24" fill="none"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13" stroke="#3B9EFF" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </button>
                  <button onClick={()=>onDeleteMatch(match.id)}
                    style={{background:"#EF444420",border:"1px solid #EF444440",borderRadius:sz(8),width:sz(32),height:sz(32),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <svg width={sz(14)} height={sz(14)} viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="#EF4444" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </button>
                </div>
              </div>

              {/* Desplegable */}
              {isOpen && (
                <div style={{background:p.cardAlt,borderTop:"1px solid "+p.border}}>

                  {/* Filtro cuarto — arriba del todo, filtra tabla y cronologia */}
                  <div style={{padding:""+sz(10)+"px "+sz(12)+"px "+sz(6)+"px"}}>
                    <div style={{display:"flex",gap:sz(4),background:p.tab,borderRadius:sz(9),padding:3}}>
                      {["todo","C1","C2","C3","C4"].map(opt=>(
                        <button key={opt} onClick={()=>setQ(match.id,opt)}
                          style={{flex:1,padding:""+sz(6)+"px "+sz(4)+"px",borderRadius:sz(7),border:"none",cursor:"pointer",fontWeight:700,fontSize:sz(11),background:q===opt?ac+"33":"transparent",color:q===opt?ac:p.mutedLo}}>
                          {opt==="todo"?"Todo":opt}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Tabla de totales filtrados */}
                  <div style={{padding:""+sz(4)+"px "+sz(16)+"px "+sz(10)+"px"}}>

                    {/* Boton modo edicion */}
                    <div style={{display:"flex",justifyContent:"flex-end",marginBottom:sz(8)}}>
                      <button onClick={()=>setEditMatch(editMatch===match.id?null:match.id)}
                        style={{background:editMatch===match.id?"#FBBF2422":"transparent",border:"1px solid "+(editMatch===match.id?"#FBBF2460":p.border),borderRadius:sz(8),padding:""+sz(5)+"px "+sz(12)+"px",cursor:"pointer",color:editMatch===match.id?"#FBBF24":p.mutedLo,fontSize:sz(11),fontWeight:700}}>
                        {editMatch===match.id?"✓ Guardar":"✏ Editar"}
                      </button>
                    </div>

                    {/* Header columnas */}
                    {(()=>{
                      const isEdit = editMatch===match.id;
                      const colTemplate = isEdit ? "1fr 80px 80px" : "1fr 48px 48px";

                      // Definicion de filas con subtipos
                      const EDIT_ROWS = [
                        {label:"Ingresos",  id:"ingreso_area", subs:[
                          {label:"Centro",      subField:"ingressType", subVal:"centro"},
                          {label:"Combinacion", subField:"ingressType", subVal:"combinacion"},
                          {label:"Desborde",    subField:"ingressType", subVal:"desborde"},
                          {label:"Individual",  subField:"ingressType", subVal:"individual"},
                        ]},
                        {label:"Tiros",     id:"tiro_arco", subs:[
                          {label:"Jugada",  subField:"shotType", subVal:"jugada"},
                          {label:"Corner",  subField:"shotType", subVal:"corner"},
                          {label:"Rebote",  subField:"shotType", subVal:"rebote"},
                          {label:"Desvio",  subField:"shotType", subVal:"desvio"},
                        ]},
                        {label:"Corners", id:"corner", subs:[]},
                        {label:"Goles",   id:"gol",    subs:[
                          {label:"Jugada", subField:"golType", subVal:"jugada"},
                          {label:"Corner", subField:"golType", subVal:"corner"},
                          {label:"Penal",  subField:"golType", subVal:"penal"},
                        ]},
                        {label:"Penales", id:"penal", subs:[]},
                      ];

                      const countEv = (type, side, subField, subVal) => {
                        let f = tlEvs.filter(e=>e.type===type&&e.side===side);
                        if (subField&&subVal) f=f.filter(e=>e[subField]===subVal);
                        return f.length;
                      };

                      const Btn = ({onClick, color, children}) => (
                        <button onClick={onClick} style={{background:color+"22",border:"1px solid "+color+"44",borderRadius:sz(6),width:sz(26),height:sz(26),cursor:"pointer",color:color,fontWeight:900,fontSize:sz(14),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{children}</button>
                      );

                      const qPeriod = q==="todo" ? null : PERIODS[parseInt(q[1])-1];

                      return (
                        <div>
                          {/* Header */}
                          <div style={{display:"grid",gridTemplateColumns:colTemplate,marginBottom:sz(6)}}>
                            <span style={{color:p.mutedLo,fontSize:sz(10),fontWeight:700}}>ACCION</span>
                            <span style={{color:ac,fontSize:sz(10),fontWeight:700,textAlign:"center"}}>NUESTRO</span>
                            <span style={{color:"#EF4444",fontSize:sz(10),fontWeight:700,textAlign:"center"}}>RIVAL</span>
                          </div>

                          {EDIT_ROWS.map(row => {
                            const o = countEv(row.id,"own",null,null);
                            const r = countEv(row.id,"rival",null,null);
                            return (
                              <div key={row.id}>
                                {/* Fila principal */}
                                <div style={{display:"grid",gridTemplateColumns:colTemplate,padding:""+sz(8)+"px 0",borderBottom:row.subs.length===0||!isEdit?"1px solid "+p.tab:"none"}}>
                                  <span style={{display:"flex",alignItems:"center",gap:sz(7)}}>
                                    <SvgIcon id={row.id} size={sz(13)} color={p.mutedHi}/>
                                    <span style={{color:p.mutedHi,fontSize:sz(13),fontWeight:700}}>{row.label}</span>
                                  </span>
                                  {isEdit && row.subs.length===0 ? (
                                    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:sz(4)}}>
                                      <Btn onClick={()=>removeEditEvent(match.id,row.id,"own",qPeriod||PERIODS[0],null,null)} color="#EF4444">−</Btn>
                                      <span style={{fontWeight:800,fontSize:sz(15),color:o>r?ac:o===0?p.border:p.text,minWidth:sz(20),textAlign:"center"}}>{o}</span>
                                      <Btn onClick={()=>addEditEvent(match.id,row.id,"own",qPeriod||PERIODS[0],null,null)} color={ac}>+</Btn>
                                    </div>
                                  ) : (
                                    <span style={{textAlign:"center",fontWeight:800,fontSize:sz(16),color:o>r?ac:o===0?p.border:p.text}}>{o}</span>
                                  )}
                                  {isEdit && row.subs.length===0 ? (
                                    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:sz(4)}}>
                                      <Btn onClick={()=>removeEditEvent(match.id,row.id,"rival",qPeriod||PERIODS[0],null,null)} color="#EF4444">−</Btn>
                                      <span style={{fontWeight:800,fontSize:sz(15),color:r>o?"#EF4444":r===0?p.border:p.text,minWidth:sz(20),textAlign:"center"}}>{r}</span>
                                      <Btn onClick={()=>addEditEvent(match.id,row.id,"rival",qPeriod||PERIODS[0],null,null)} color="#EF4444">+</Btn>
                                    </div>
                                  ) : (
                                    <span style={{textAlign:"center",fontWeight:800,fontSize:sz(16),color:r>o?"#EF4444":r===0?p.border:p.text}}>{r}</span>
                                  )}
                                </div>

                                {/* Subfilas */}
                                {row.subs.length>0 && (
                                  <div style={{marginBottom:sz(4),borderBottom:"1px solid "+p.tab}}>
                                    {row.subs.map(sub => {
                                      const so = countEv(row.id,"own",sub.subField,sub.subVal);
                                      const sr = countEv(row.id,"rival",sub.subField,sub.subVal);
                                      return (
                                        <div key={sub.subVal} style={{display:"grid",gridTemplateColumns:colTemplate,padding:""+sz(5)+"px 0 "+sz(5)+"px "+sz(16)+"px"}}>
                                          <span style={{color:p.mutedLo,fontSize:sz(11),fontStyle:"italic"}}>· {sub.label}</span>
                                          {isEdit ? (
                                            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:sz(3)}}>
                                              <Btn onClick={()=>removeEditEvent(match.id,row.id,"own",qPeriod||PERIODS[0],sub.subField,sub.subVal)} color="#EF4444">−</Btn>
                                              <span style={{fontWeight:700,fontSize:sz(13),color:so>0?ac:p.border,minWidth:sz(18),textAlign:"center"}}>{so}</span>
                                              <Btn onClick={()=>addEditEvent(match.id,row.id,"own",qPeriod||PERIODS[0],sub.subField,sub.subVal)} color={ac}>+</Btn>
                                            </div>
                                          ) : (
                                            <span style={{textAlign:"center",fontWeight:700,fontSize:sz(13),color:so>0?ac:p.border}}>{so}</span>
                                          )}
                                          {isEdit ? (
                                            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:sz(3)}}>
                                              <Btn onClick={()=>removeEditEvent(match.id,row.id,"rival",qPeriod||PERIODS[0],sub.subField,sub.subVal)} color="#EF4444">−</Btn>
                                              <span style={{fontWeight:700,fontSize:sz(13),color:sr>0?"#EF4444":p.border,minWidth:sz(18),textAlign:"center"}}>{sr}</span>
                                              <Btn onClick={()=>addEditEvent(match.id,row.id,"rival",qPeriod||PERIODS[0],sub.subField,sub.subVal)} color="#EF4444">+</Btn>
                                            </div>
                                          ) : (
                                            <span style={{textAlign:"center",fontWeight:700,fontSize:sz(13),color:sr>0?"#EF4444":p.border}}>{sr}</span>
                                          )}
                                        </div>
                                      );
                                    })}
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      );
                    })()}

                    {/* Tarjetas si las hay en el periodo filtrado */}
                    {(()=>{
                      const cards = [["tarjeta_verde","#22C55E","TV"],["tarjeta_amarilla","#EAB308","TA"],["tarjeta_roja","#EF4444","TR"]].filter(([tid])=>tlEvs.filter(e=>e.type===tid&&e.side==="own").length>0);
                      if (!cards.length) return null;
                      return (
                        <div style={{display:"flex",gap:sz(8),marginTop:sz(10)}}>
                          {cards.map(([tid,col,lbl])=>{
                            const cnt = tlEvs.filter(e=>e.type===tid&&e.side==="own").length;
                            return (
                              <div key={tid} style={{display:"flex",alignItems:"center",gap:sz(5),background:col+"18",border:"1px solid "+col+"44",borderRadius:sz(20),padding:""+sz(4)+"px "+sz(10)+"px"}}>
                                <SvgIcon id={tid} size={sz(12)} color={col}/>
                                <span style={{color:col,fontWeight:700,fontSize:sz(12)}}>{cnt} {lbl}</span>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })()}
                  </div>

                    {/* Notas del partido */}
                    {match.notes && !editMatch && (
                      <div style={{margin:"0 "+sz(16)+"px "+sz(8)+"px",padding:""+sz(10)+"px "+sz(12)+"px",background:p.cardAlt,borderRadius:sz(8),border:"1px solid "+p.border}}>
                        <div style={{color:p.mutedLo,fontSize:sz(10),fontWeight:700,marginBottom:sz(4)}}>NOTAS</div>
                        <div style={{color:p.textSub,fontSize:sz(12),lineHeight:1.5}}>{match.notes}</div>
                      </div>
                    )}
                    {editMatch===match.id && (
                      <div style={{margin:"0 "+sz(16)+"px "+sz(8)+"px",padding:""+sz(10)+"px "+sz(12)+"px",background:p.cardAlt,borderRadius:sz(8),border:"1px solid #FBBF2440"}}>
                        <div style={{color:"#FBBF24",fontSize:sz(10),fontWeight:700,marginBottom:sz(4)}}>NOTAS</div>
                        <textarea defaultValue={match.notes||""} onBlur={e=>{
                          const updated=data.matches.map(m=>m.id===match.id?{...m,notes:e.target.value}:m);
                          onUpdateData({...data,matches:updated});
                        }} rows={2} placeholder="Observaciones del partido..."
                          style={{width:"100%",background:p.card,border:"1px solid "+p.border,borderRadius:sz(6),color:p.text,padding:sz(8),fontSize:sz(12),outline:"none",resize:"none",boxSizing:"border-box",fontFamily:"inherit"}}
                        />
                      </div>
                    )}

                  {/* Boton cronologia */}
                  <div style={{borderTop:"1px solid "+p.border}}>
                    <button onClick={()=>toggleTimeline(match.id)}
                      style={{width:"100%",background:"none",border:"none",padding:""+sz(10)+"px "+sz(16)+"px",display:"flex",alignItems:"center",gap:sz(8),cursor:"pointer"}}>
                      <SvgIcon id="history" size={sz(14)} color={showTL?ac:p.mutedLo}/>
                      <span style={{flex:1,color:showTL?ac:p.mutedLo,fontSize:sz(12),fontWeight:700,textAlign:"left"}}>Cronologia ({tlEvs.length} eventos)</span>
                      <span style={{color:showTL?ac:p.borderSt,fontSize:sz(16),display:"inline-block",transform:showTL?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s"}}>&#8250;</span>
                    </button>

                    {showTL && (
                      tlEvs.length===0
                        ? <div style={{color:p.mutedLo,fontSize:sz(12),padding:""+sz(10)+"px "+sz(16)+"px",textAlign:"center"}}>Sin eventos en este cuarto</div>
                        : tlEvs.map((ev,i)=>{
                            const et = EVENT_TYPES.find(e=>e.id===ev.type);
                            return (
                              <div key={ev.id} style={{padding:""+sz(9)+"px "+sz(16)+"px",display:"flex",alignItems:"center",gap:sz(10),borderTop:"1px solid "+p.tab,background:i%2===0?"transparent":p.card+"60"}}>
                                <SvgIcon id={ev.type} size={sz(14)} color={et?.color||ac}/>
                                <span style={{color:p.textSub,fontSize:sz(12),flex:1}}>
                                  {et?.label}
                                  {ev.ingressLabel&&" / "+ev.ingressLabel}
                                  {ev.golLabel&&" / "+ev.golLabel}
                                  {ev.shotLabel&&" / "+ev.shotLabel}
                                </span>
                                <span style={{color:ev.side==="own"?ac:"#EF4444",fontSize:sz(11),fontWeight:700,marginRight:sz(6)}}>{ev.side==="own"?"FAV":"CON"}</span>
                                <span style={{color:p.mutedLo,fontSize:sz(11),flexShrink:0}}>{ev.minute}' C{PERIODS.indexOf(ev.quarter)+1}</span>
                              </div>
                            );
                          })
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>

    {/* Modal comparativa */}
    {showCompare && (()=>{
      const PERIODS = ["1er Cuarto","2do Cuarto","3er Cuarto","4to Cuarto"];
      const compMatches = compareList.map(id=>allMatches.find(m=>m.id===id)).filter(Boolean);

      const count = (match, type, side, sf, sv) => {
        let f = (match.events||[]).filter(e=>e.type===type&&e.side===side);
        if(sf&&sv) f=f.filter(e=>e[sf]===sv);
        return f.length;
      };

      const ROWS = [
        {section:"OFENSIVO"},
        {label:"Ingresos a favor",   fn:(m)=>count(m,"ingreso_area","own",null,null), better:"max"},
        {label:"  · Centro",         fn:(m)=>count(m,"ingreso_area","own","ingressType","centro"), better:"max", sub:true},
        {label:"  · Combinacion",    fn:(m)=>count(m,"ingreso_area","own","ingressType","combinacion"), better:"max", sub:true},
        {label:"  · Desborde",       fn:(m)=>count(m,"ingreso_area","own","ingressType","desborde"), better:"max", sub:true},
        {label:"  · Individual",     fn:(m)=>count(m,"ingreso_area","own","ingressType","individual"), better:"max", sub:true},
        {label:"Tiros al arco",      fn:(m)=>count(m,"tiro_arco","own",null,null), better:"max"},
        {label:"  · Jugada",         fn:(m)=>count(m,"tiro_arco","own","shotType","jugada"), better:"max", sub:true},
        {label:"  · Corner",         fn:(m)=>count(m,"tiro_arco","own","shotType","corner"), better:"max", sub:true},
        {label:"  · Rebote",         fn:(m)=>count(m,"tiro_arco","own","shotType","rebote"), better:"max", sub:true},
        {label:"  · Desvio",         fn:(m)=>count(m,"tiro_arco","own","shotType","desvio"), better:"max", sub:true},
        {label:"Corners a favor",    fn:(m)=>count(m,"corner","own",null,null), better:"max"},
        {label:"Goles a favor",      fn:(m)=>count(m,"gol","own",null,null), better:"max"},
        {label:"  · Jugada",         fn:(m)=>count(m,"gol","own","golType","jugada"), better:"max", sub:true},
        {label:"  · Corner",         fn:(m)=>count(m,"gol","own","golType","corner"), better:"max", sub:true},
        {label:"  · Penal",          fn:(m)=>count(m,"gol","own","golType","penal"), better:"max", sub:true},
        {label:"Penales a favor",    fn:(m)=>count(m,"penal","own",null,null), better:"max"},
        {section:"DEFENSIVO"},
        {label:"Ingresos en contra",  fn:(m)=>count(m,"ingreso_area","rival",null,null), better:"min"},
        {label:"  · Centro",          fn:(m)=>count(m,"ingreso_area","rival","ingressType","centro"), better:"min", sub:true},
        {label:"  · Combinacion",     fn:(m)=>count(m,"ingreso_area","rival","ingressType","combinacion"), better:"min", sub:true},
        {label:"  · Desborde",        fn:(m)=>count(m,"ingreso_area","rival","ingressType","desborde"), better:"min", sub:true},
        {label:"  · Individual",      fn:(m)=>count(m,"ingreso_area","rival","ingressType","individual"), better:"min", sub:true},
        {label:"Tiros recibidos",     fn:(m)=>count(m,"tiro_arco","rival",null,null), better:"min"},
        {label:"Corners en contra",   fn:(m)=>count(m,"corner","rival",null,null), better:"min"},
        {label:"Goles en contra",     fn:(m)=>count(m,"gol","rival",null,null), better:"min"},
        {label:"Penales en contra",   fn:(m)=>count(m,"penal","rival",null,null), better:"min"},
        {section:"DISCIPLINA"},
        {label:"Tarjetas verdes",     fn:(m)=>count(m,"tarjeta_verde","own",null,null), better:"none"},
        {label:"Tarjetas amarillas",  fn:(m)=>count(m,"tarjeta_amarilla","own",null,null), better:"min"},
        {label:"Tarjetas rojas",      fn:(m)=>count(m,"tarjeta_roja","own",null,null), better:"min"},
      ];

      return (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#00000088",zIndex:200,overflowY:"auto"}}>
          <div style={{background:p.bg,minHeight:"100vh",padding:sz(16)}}>
            <div style={{display:"flex",alignItems:"center",gap:sz(10),marginBottom:sz(16)}}>
              <button onClick={()=>{setShowCompare(false);setCompareList([]);}} style={{background:p.border,border:"none",color:p.mutedHi,borderRadius:sz(8),width:sz(36),height:sz(36),cursor:"pointer",flexShrink:0}}>&#8249;</button>
              <div>
                <div style={{color:p.text,fontWeight:800,fontSize:sz(16)}}>Comparativa</div>
                <div style={{color:p.muted,fontSize:sz(11)}}>{compMatches.length} partidos seleccionados</div>
              </div>
            </div>

            {/* Match headers */}
            <div style={{display:"grid",gridTemplateColumns:"1fr repeat("+compMatches.length+", 1fr)",gap:sz(6),marginBottom:sz(12)}}>
              <div/>
              {compMatches.map(m=>{
                const og=(m.events||[]).filter(e=>e.type==="gol"&&e.side==="own").length;
                const rg=(m.events||[]).filter(e=>e.type==="gol"&&e.side==="rival").length;
                const rc=og>rg?ac:og===rg?"#FBBF24":"#EF4444";
                return (
                  <div key={m.id} style={{background:p.card,border:"1px solid "+p.border,borderRadius:sz(10),padding:sz(8),textAlign:"center"}}>
                    <div style={{fontWeight:800,fontSize:sz(15),color:rc}}>{og} - {rg}</div>
                    <div style={{color:p.mutedHi,fontSize:sz(11),fontWeight:600}}>vs {m.rival}</div>
                    <div style={{color:p.mutedLo,fontSize:sz(10)}}>{m.date}</div>
                  </div>
                );
              })}
            </div>

            {/* Table */}
            {ROWS.map((row,ri)=>{
              if(row.section) return (
                <div key={row.section} style={{background:p.card,padding:""+sz(6)+"px "+sz(10)+"px",marginTop:sz(8),marginBottom:sz(2),borderRadius:sz(6)}}>
                  <span style={{color:p.mutedLo,fontSize:sz(10),fontWeight:700}}>{row.section}</span>
                </div>
              );

              const vals = compMatches.map(m=>row.fn(m));
              const best = row.better==="max"?Math.max(...vals):row.better==="min"?Math.min(...vals):null;

              return (
                <div key={ri} style={{display:"grid",gridTemplateColumns:"1fr repeat("+compMatches.length+", 1fr)",padding:""+sz(6)+"px "+sz(4)+"px",borderBottom:"1px solid "+p.tab,background:ri%2===0?"transparent":p.card+"30"}}>
                  <span style={{color:row.sub?p.mutedLo:p.mutedHi,fontSize:row.sub?sz(11):sz(12),fontStyle:row.sub?"italic":"normal",paddingLeft:row.sub?sz(10):0,display:"flex",alignItems:"center"}}>{row.label}</span>
                  {vals.map((v,vi)=>{
                    const isBest = best!==null && v===best && vals.filter(x=>x===best).length<vals.length;
                    const isWorst = best!==null && vals.some(x=>x!==v);
                    const col = isBest?(row.better==="max"?ac:"#00C896"):row.sub?p.mutedLo:p.text;
                    return (
                      <span key={vi} style={{textAlign:"center",fontWeight:isBest?800:row.sub?400:600,fontSize:row.sub?sz(12):sz(15),color:col}}>
                        {isBest && <span style={{fontSize:sz(8),marginRight:2}}>▲</span>}
                        {v}
                      </span>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      );
    })()}
    </div>
  );
}

function StatsView({data, club, team, onBack, sheetsUrl, syncAll}) {
  const {p, ac, fs} = useTheme();
  const sz = n => Math.round(n*fs);
  const matches = data.matches.filter(m=>m.teamId===team.id&&m.clubId===club.id);
  const n = matches.length;
  const [tab, setTab] = useState("ofensivo");

  if (n===0) {
    return (
      <div style={{padding:sz(24),maxWidth:600,margin:"0 auto"}}>
        <Header title="Estadisticas Generales" onBack={onBack}/>
        <p style={{color:p.mutedLo,textAlign:"center",padding:""+sz(48)+"px 0"}}>No hay partidos registrados.</p>
      </div>
    );
  }

  const allEvs = matches.flatMap(m=>m.events||[]);
  const count  = (type,side) => allEvs.filter(e=>e.type===type&&(!side||e.side===side)).length;
  const avg    = v => (v/n).toFixed(1);
  const pct    = (num,den) => den===0?"--":Math.round((num/den)*100)+"%";

  const ownGoals=count("gol","own"), rivalGoals=count("gol","rival");
  const ownIng=count("ingreso_area","own"), rivalIng=count("ingreso_area","rival");
  const ownTiros=count("tiro_arco","own"), rivalTiros=count("tiro_arco","rival");
  const ownCorn=count("corner","own"), rivalCorn=count("corner","rival");

  const wins   = matches.filter(m=>{const og=(m.events||[]).filter(e=>e.type==="gol"&&e.side==="own").length,rg=(m.events||[]).filter(e=>e.type==="gol"&&e.side==="rival").length;return og>rg;}).length;
  const draws  = matches.filter(m=>{const og=(m.events||[]).filter(e=>e.type==="gol"&&e.side==="own").length,rg=(m.events||[]).filter(e=>e.type==="gol"&&e.side==="rival").length;return og===rg;}).length;
  const losses = n-wins-draws;

  const cleanSheets  = matches.filter(m=>(m.events||[]).filter(e=>e.type==="gol"&&e.side==="rival").length===0).length;
  const matchesWGoal = matches.filter(m=>(m.events||[]).some(e=>e.type==="gol"&&e.side==="own")).length;

  const oGJ=allEvs.filter(e=>e.type==="gol"&&e.side==="own"&&e.golType==="jugada").length;
  const oGC=allEvs.filter(e=>e.type==="gol"&&e.side==="own"&&e.golType==="corner").length;
  const oGP=allEvs.filter(e=>e.type==="gol"&&e.side==="own"&&e.golType==="penal").length;
  const rGC=allEvs.filter(e=>e.type==="gol"&&e.side==="rival"&&e.golType==="corner").length;

  const oSJ=allEvs.filter(e=>e.type==="tiro_arco"&&e.side==="own"&&e.shotType==="jugada").length;
  const oSC=allEvs.filter(e=>e.type==="tiro_arco"&&e.side==="own"&&e.shotType==="corner").length;
  const oSR=allEvs.filter(e=>e.type==="tiro_arco"&&e.side==="own"&&e.shotType==="rebote").length;
  const oSD=allEvs.filter(e=>e.type==="tiro_arco"&&e.side==="own"&&e.shotType==="desvio").length;
  const oSU=ownTiros-oSJ-oSC-oSR-oSD;
  const oGU=ownGoals-oGJ-oGC-oGP;

  const ingrTotals = INGRESS_TYPES.map(it=>({...it, own:allEvs.filter(e=>e.type==="ingreso_area"&&e.side==="own"&&e.ingressType===it.id).length, rival:allEvs.filter(e=>e.type==="ingreso_area"&&e.side==="rival"&&e.ingressType===it.id).length}));
  const byQ = PERIODS.map((q,qi)=>({q,short:"C"+(qi+1), goals:allEvs.filter(e=>e.type==="gol"&&e.side==="own"&&e.quarter===q).length, ing:allEvs.filter(e=>e.type==="ingreso_area"&&e.side==="own"&&e.quarter===q).length, ga:allEvs.filter(e=>e.type==="gol"&&e.side==="rival"&&e.quarter===q).length, ia:allEvs.filter(e=>e.type==="ingreso_area"&&e.side==="rival"&&e.quarter===q).length}));
  const bestQ  = [...byQ].sort((a,b)=>b.goals-a.goals)[0];
  const worstQ = [...byQ].sort((a,b)=>b.ga-a.ga)[0];

  const BarRows = ({rows, total_}) => (
    <div>
      <div style={{display:"flex",height:sz(20),borderRadius:sz(8),overflow:"hidden",marginBottom:sz(16),gap:3}}>
        {rows.filter(r=>r.v>0).map(r=><div key={r.l} style={{flex:r.v,background:r.c,borderRadius:sz(4)}}/>)}
      </div>
      {rows.map(r=>(
        <div key={r.l} style={{display:"flex",alignItems:"center",gap:sz(10),marginBottom:sz(6)}}>
          <div style={{width:sz(10),height:sz(10),borderRadius:sz(2),background:r.c,flexShrink:0}}/>
          <span style={{color:p.mutedHi,fontSize:sz(13),flex:1}}>{r.l}</span>
          <span style={{color:p.text,fontWeight:800,fontSize:sz(15)}}>{r.v}</span>
          <span style={{color:p.mutedLo,fontSize:sz(12),minWidth:sz(38),textAlign:"right"}}>{pct(r.v,total_)}</span>
        </div>
      ))}
    </div>
  );

  const EfRow = ({label, value, invert, last}) => {
    const num = value==="--"?0:parseInt(value);
    const barColor = invert ? (num>=50?"#EF4444":num>=25?"#FBBF24":ac) : (num>=50?ac:num>=25?"#FBBF24":"#3B9EFF");
    return (
      <div style={{padding:""+sz(10)+"px "+sz(16)+"px",borderBottom:last?"none":"1px solid "+p.tab,display:"flex",alignItems:"center",gap:sz(10)}}>
        <span style={{color:p.mutedHi,fontSize:sz(13),flex:1}}>{label}</span>
        <div style={{width:sz(80),height:sz(5),borderRadius:sz(3),background:p.border,overflow:"hidden",marginRight:sz(8)}}>
          {value!=="--"&&<div style={{width:Math.min(num,100)+"%",height:"100%",background:barColor,borderRadius:sz(3)}}/>}
        </div>
        <span style={{color:p.text,fontWeight:800,fontSize:sz(14),minWidth:sz(36),textAlign:"right"}}>{value}</span>
      </div>
    );
  };

  const shareStatsImage = (mode, d) => {
    const SCALE = 2; // retina 2x -> ~1800px wide
    const W = 960;
    const isOff = mode==="ofensivo";
    const COLOR  = isOff?"#00C896":"#EF4444";
    const COLOR2 = isOff?"#3B9EFF":"#FBBF24";
    const TITLE  = isOff?"ESTADÍSTICAS OFENSIVAS":"ESTADÍSTICAS DEFENSIVAS";

    const n       = d.n;
    const pct     = (a,b) => b===0?"--":Math.round(a/b*100)+"%";
    const avg     = v  => n>0?(v/n).toFixed(1):"0.0";
    const ownG    = d.ownGoals, rivG = d.rivalGoals;
    const ownT    = d.ownTiros, rivT = d.rivalTiros;
    const ownI    = d.ownIng,   rivI = d.rivalIng;
    const ownC    = d.ownCorn,  rivC = d.rivalCorn;
    const ingOwn  = d.ingrTotals;
    const ingRiv  = d.ingrTotals;

    // Build sections: each section = {title, rows:[{label,value,sub?,pct?}]}
    const sections = isOff ? [
      { title:"RESUMEN GENERAL", rows:[
        {label:"Ingresos al area",   v1:ownI,   v2:avg(ownI)},
        {label:"  · Centro",         v1:ingOwn.find(t=>t.id==="centro")?.own||0,    v2:"", sub:true},
        {label:"  · Combinacion",    v1:ingOwn.find(t=>t.id==="combinacion")?.own||0,v2:"", sub:true},
        {label:"  · Desborde",       v1:ingOwn.find(t=>t.id==="desborde")?.own||0,  v2:"", sub:true},
        {label:"  · Individual",     v1:ingOwn.find(t=>t.id==="individual")?.own||0, v2:"", sub:true},
        {label:"Tiros al arco",      v1:ownT,   v2:avg(ownT)},
        {label:"  · Jugada",         v1:d.oSJ,  v2:"", sub:true},
        {label:"  · Corner",         v1:d.oSC,  v2:"", sub:true},
        {label:"  · Rebote",         v1:d.oSR,  v2:"", sub:true},
        {label:"  · Desvio",         v1:d.oSD,  v2:"", sub:true},
        {label:"Corners",            v1:ownC,   v2:avg(ownC)},
        {label:"Goles",              v1:ownG,   v2:avg(ownG)},
        {label:"  · Jugada",         v1:d.oGJ,  v2:"", sub:true},
        {label:"  · Corner",         v1:d.oGC,  v2:"", sub:true},
        {label:"  · Penal",          v1:d.oGP,  v2:"", sub:true},
        {label:"Penales",            v1:d.ownPen||0, v2:avg(d.ownPen||0)},
      ]},
      { title:"GOLES A FAVOR", rows:[
        {label:"Total de goles",            v1:ownG,                    v2:""},
        {label:"Promedio por partido",       v1:avg(ownG),               v2:""},
        {label:"Partidos con gol",           v1:d.matchesWGoal+" de "+n, v2:""},
        {label:"% partidos con gol",         v1:pct(d.matchesWGoal,n),   v2:""},
      ]},
      { title:"EFICIENCIA OFENSIVA", rows:[
        {label:"Tiros por partido",           v1:avg(ownT),           v2:""},
        {label:"Goles por partido",           v1:avg(ownG),           v2:""},
        {label:"% tiros -> gol",             v1:pct(ownG,ownT),      v2:"", bar:true, val:ownG, den:ownT},
        {label:"Ingresos por partido",        v1:avg(ownI),           v2:""},
        {label:"% ingresos -> tiro",         v1:pct(ownT,ownI),      v2:"", bar:true, val:ownT, den:ownI},
        {label:"% ingresos -> gol",          v1:pct(ownG,ownI),      v2:"", bar:true, val:ownG, den:ownI},
        {label:"Corners por partido",         v1:avg(ownC),           v2:""},
        {label:"% corners -> gol",           v1:pct(ownG,ownC),      v2:"", bar:true, val:ownG, den:ownC},
      ]},
    ] : [
      { title:"RESUMEN GENERAL", rows:[
        {label:"Ingresos recibidos",  v1:rivI,  v2:avg(rivI)},
        {label:"  · Centro",         v1:ingRiv.find(t=>t.id==="centro")?.rival||0,    v2:"", sub:true},
        {label:"  · Combinacion",    v1:ingRiv.find(t=>t.id==="combinacion")?.rival||0,v2:"", sub:true},
        {label:"  · Desborde",       v1:ingRiv.find(t=>t.id==="desborde")?.rival||0,  v2:"", sub:true},
        {label:"  · Individual",     v1:ingRiv.find(t=>t.id==="individual")?.rival||0, v2:"", sub:true},
        {label:"Tiros recibidos",    v1:rivT,  v2:avg(rivT)},
        {label:"Corners en contra",  v1:rivC,  v2:avg(rivC)},
        {label:"Goles en contra",    v1:rivG,  v2:avg(rivG)},
        {label:"Penales en contra",  v1:d.rivalPen||0, v2:avg(d.rivalPen||0)},
      ]},
      { title:"GOLES EN CONTRA", rows:[
        {label:"Total goles recibidos",      v1:rivG,                     v2:""},
        {label:"Promedio por partido",        v1:avg(rivG),                v2:""},
        {label:"Partidos valla invicta",      v1:d.cleanSheets+" de "+n,   v2:""},
        {label:"% valla invicta",             v1:pct(d.cleanSheets,n),     v2:""},
      ]},
      { title:"EFICIENCIA DEFENSIVA", rows:[
        {label:"Tiros recibidos por partido", v1:avg(rivT),           v2:""},
        {label:"Goles recibidos por partido", v1:avg(rivG),           v2:""},
        {label:"% tiros recibidos -> gol",   v1:pct(rivG,rivT),      v2:"", bar:true, val:rivG, den:rivT},
        {label:"Ingresos recibidos/partido",  v1:avg(rivI),           v2:""},
        {label:"% ingresos recibidos -> tiro",v1:pct(rivT,rivI),     v2:"", bar:true, val:rivT, den:rivI},
        {label:"% ingresos recibidos -> gol", v1:pct(rivG,rivI),     v2:"", bar:true, val:rivG, den:rivI},
        {label:"Corners en contra/partido",   v1:avg(rivC),           v2:""},
        {label:"% corners rivales -> gol",   v1:pct(rivG,rivC),      v2:"", bar:true, val:rivG, den:rivC},
      ]},
    ];

    // Calculate total height
    const HEADER_H = 130;
    const SEC_TITLE_H = 32;
    const ROW_H = 30;
    const SUB_H = 22;
    const GAP_H = 16;
    let totalH = HEADER_H + GAP_H;
    sections.forEach(sec => {
      totalH += SEC_TITLE_H + 26; // title + col headers
      sec.rows.forEach(r => totalH += r.sub?SUB_H:ROW_H);
      totalH += GAP_H;
    });
    totalH += 20;

    const canvas = document.createElement("canvas");
    canvas.width  = W * SCALE;
    canvas.height = totalH * SCALE;
    const ctx = canvas.getContext("2d");
    ctx.scale(SCALE, SCALE);

    // Background
    ctx.fillStyle="#020817"; ctx.fillRect(0,0,W,totalH);

    // Header
    ctx.fillStyle="#0f172a"; ctx.fillRect(0,0,W,HEADER_H);
    ctx.fillStyle=COLOR; ctx.font="bold 26px 'DM Sans',sans-serif"; ctx.textAlign="center";
    ctx.fillText(TITLE, W/2, 42);
    ctx.fillStyle="#94a3b8"; ctx.font="15px 'DM Sans',sans-serif";
    ctx.fillText(d.team.name+" · "+n+" partido"+(n!==1?"s":""), W/2, 70);
    ctx.fillStyle="#475569"; ctx.font="13px 'DM Sans',sans-serif";
    ctx.fillText(d.wins+"G  "+d.draws+"E  "+d.losses+"P  ·  "+d.club.name, W/2, 94);
    ctx.fillStyle=COLOR+"70"; ctx.font="bold 11px 'DM Sans',sans-serif";
    ctx.fillText("Live Tracker", W/2, 118);

    let y = HEADER_H + GAP_H;

    sections.forEach(sec => {
      // Section title
      ctx.fillStyle=COLOR+"25";
      ctx.beginPath(); ctx.roundRect(12,y,W-24,SEC_TITLE_H,6); ctx.fill();
      ctx.fillStyle=COLOR; ctx.font="bold 13px 'DM Sans',sans-serif"; ctx.textAlign="left";
      ctx.fillText(sec.title, 24, y+SEC_TITLE_H/2+5);
      y += SEC_TITLE_H;

      // Col headers
      ctx.fillStyle="#1e293b"; ctx.fillRect(0,y,W,26);
      ctx.fillStyle="#64748b"; ctx.font="bold 10px 'DM Sans',sans-serif";
      ctx.textAlign="left"; ctx.fillText("ESTADÍSTICA",16,y+17);
      ctx.textAlign="center";
      ctx.fillText("TOTAL",W-200,y+17);
      ctx.fillText("PROM/PJ",W-100,y+17);
      ctx.fillText("BARRA",W-30,y+17);
      y += 26;

      sec.rows.forEach((row,ri) => {
        const rh = row.sub?SUB_H:ROW_H;
        ctx.fillStyle = row.sub?"#0b1526":(ri%2===0?"#0f172a":"#1e293b");
        ctx.fillRect(0,y,W,rh);

        // Label
        ctx.fillStyle = row.sub?"#475569":"#cbd5e1";
        ctx.font = row.sub?"italic 11px 'DM Sans',sans-serif":"12px 'DM Sans',sans-serif";
        ctx.textAlign="left";
        ctx.fillText(row.label, row.sub?28:16, y+rh/2+4);

        // Total highlight bg
        if(!row.sub){
          ctx.fillStyle=COLOR+"15";
          ctx.fillRect(W-250,y+2,80,rh-4);
        }

        // v1 (total or value)
        ctx.fillStyle = row.sub?"#64748b":(row.v1>0||typeof row.v1==="string"?COLOR:"#334155");
        ctx.font = row.sub?"11px 'DM Sans',sans-serif":"bold 14px 'DM Sans',sans-serif";
        ctx.textAlign="center";
        ctx.fillText(row.v1, W-200, y+rh/2+4);

        // v2 (avg)
        if(row.v2!==""){
          ctx.fillStyle="#64748b"; ctx.font="12px 'DM Sans',sans-serif";
          ctx.fillText(row.v2, W-100, y+rh/2+4);
        }

        // Bar for percentage rows
        if(row.bar && !row.sub){
          const pctVal = row.den>0?Math.min(row.val/row.den,1):0;
          const BAR_W=60, BAR_H=6, BAR_X=W-65, BAR_Y=y+rh/2-3;
          ctx.fillStyle="#1e293b"; ctx.beginPath(); ctx.roundRect(BAR_X,BAR_Y,BAR_W,BAR_H,3); ctx.fill();
          if(pctVal>0){
            ctx.fillStyle=COLOR; ctx.beginPath(); ctx.roundRect(BAR_X,BAR_Y,BAR_W*pctVal,BAR_H,3); ctx.fill();
          }
        }
        y += rh;
      });
      y += GAP_H;
    });

    // Download
    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const link=document.createElement("a");
      link.download="stats-"+mode+"-"+d.team.name.replace(/\s+/g,"-")+".png";
      link.href=url; link.click();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    },"image/png");
  };

        <div style={{display:"flex",flexDirection:"column",gap:sz(12)}}>
          <button onClick={onExport} style={{background:ac,border:"none",borderRadius:sz(12),padding:sz(16),color:"#fff",fontWeight:800,fontSize:sz(15),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:sz(10)}}>
            <svg width={sz(20)} height={sz(20)} viewBox="0 0 24 24" fill="none"><path d="M12 3v12M8 11l4 4 4-4M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>

          <button onClick={()=>fileRef.current.click()} style={{background:p.cardAlt,border:"1px solid "+p.border,borderRadius:sz(12),padding:sz(16),color:p.text,fontWeight:700,fontSize:sz(15),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:sz(10)}}>
            <svg width={sz(20)} height={sz(20)} viewBox="0 0 24 24" fill="none"><path d="M12 21V9M8 13l4-4 4 4M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke={p.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            Importar datos
          </button>
          <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{ if(e.target.files[0]){ onImport(e.target.files[0]); onClose(); } }}/>
          <button onClick={onClose} style={{background:"none",border:"none",color:p.mutedLo,fontSize:sz(13),cursor:"pointer",padding:sz(8)}}>Cancelar</button>
        </div>

    </div>
  );
}


function App() {
  const [data,         setData]         = useState(()=>loadDataSync());
  const [view,         setView]         = useState("home");
  const [selClub,      setSelClub]      = useState(null);
  const [selTeam,      setSelTeam]      = useState(null);
  const [settings,     setSettings]     = useState(()=>loadSettingsSync()||DEFAULT_SETTINGS);
  const [showSettings, setShowSettings] = useState(false);
  const [showBackup,   setShowBackup]   = useState(false);
  const [sheetsUrl,    setSheetsUrl]    = useState(()=>loadSheetsUrl());
  const [syncStatus,   setSyncStatus]   = useState({});
  const [loaded,       setLoaded]       = useState(true);

  // data loaded synchronously

  const updateData = useCallback(d=>{ setData(d); saveData(d); },[]);
  const handleSaveSettings = s => { setSettings(s); saveSettings(s); };
  const handleSetSheetsUrl = url => { setSheetsUrl(url); saveSheetsUrl(url); };

  const syncAll = async (teamMatches, clubObj, teamObj) => {
    if (!sheetsUrl) { alert("Primero configurá la URL del Google Sheet."); return; }
    for (const match of teamMatches) {
      try {
        await fetch(sheetsUrl, {
          method:"POST", mode:"no-cors",
          body: JSON.stringify({
            action:"sync_match",
            match,
            clubName: clubObj?.name||"Club",
            teamName: teamObj?.name||"Equipo",
            tournamentName: (()=>{
              const tours = getTeamTournaments(data, clubObj?.id, teamObj?.id);
              return tours.find(t=>t.id===match.tournamentId)?.name||"";
            })()
          })
        });
      } catch(e) {}
    }
    alert("Sincronización completa: "+teamMatches.length+" partido"+(teamMatches.length!==1?"s":"")+" enviados.");
  };

  const syncMatch = async (match) => {
    if (!sheetsUrl) { alert("Primero configurá la URL del Google Sheet en Ajustes de sincronización."); return; }
    const club = data.clubs.find(c=>c.id===match.clubId);
    const team = (club?.teams||[]).find(t=>t.id===match.teamId);
    setSyncStatus(prev=>({...prev,[match.id]:"syncing"}));
    try {
      await fetch(sheetsUrl, {
        method:"POST", mode:"no-cors",
        body: JSON.stringify({
          action:"sync_match",
          match,
          clubName: club?.name||"Club",
          teamName: team?.name||"Equipo",
          tournamentName: (()=>{
            const tours = getTeamTournaments(data, club?.id, team?.id);
            return tours.find(t=>t.id===match.tournamentId)?.name||"";
          })()
        })
      });
      setSyncStatus(prev=>({...prev,[match.id]:"ok"}));
    } catch(e) {
      setSyncStatus(prev=>({...prev,[match.id]:"error"}));
      alert("Error al sincronizar. Verificá la URL del script.");
    }
  };

  const exportData = () => {
    const payload = { data, settings, exportedAt: new Date().toISOString(), version: 2 };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = 'live-tracker-backup-' + new Date().toLocaleDateString('es-AR').replace(/\//g,'-') + '.json';
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const payload = JSON.parse(e.target.result);
        if (payload.data) {
          updateData(payload.data);
          if (payload.settings) { setSettings(payload.settings); saveSettings(payload.settings); }
          alert('Datos importados correctamente.');
        } else {
          alert('Archivo invalido.');
        }
      } catch(err) { alert('Error al leer el archivo.'); }
    };
    reader.readAsText(file);
  };
  const handleSelectCtx = (club,team) => { setSelClub(club); setSelTeam(team); setView("team-context"); };
  const deleteMatch = id => updateData({...data, matches:data.matches.filter(m=>m.id!==id)});

  const p  = PALETTES[settings.palette] || PALETTES.azul;
  const ac = ACCENTS.find(a=>a.id===settings.accent)?.hex || "#00C896";
  const fs = FONT_SCALES[settings.fontScale] || 1;
  const theme = {p, ac, fs, iconStyle:settings.iconStyle};

  if (!loaded) {
    return (
      <div style={{minHeight:"100vh",background:"#020817",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{color:"#475569",fontSize:14}}>Cargando...</div>
      </div>
    );
  }

  return (
    <ThemeCtx.Provider value={theme}>
      <div style={{minHeight:"100vh",background:p.bg,fontFamily:"'DM Sans','Segoe UI',sans-serif",color:p.text,paddingBottom:40}}>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
        {showSettings && <SettingsPanel settings={settings} onSave={handleSaveSettings} onClose={()=>setShowSettings(false)}/>}
        {showBackup   && <BackupPanel onExport={()=>{exportData();setShowBackup(false);}} onImport={importData} onClose={()=>setShowBackup(false)}/>}
        {view==="home"         && <HomeView      data={data} onUpdateData={updateData} onSelectContext={handleSelectCtx} onOpenSettings={()=>setShowSettings(true)} onOpenBackup={()=>setShowBackup(true)}/>}
        {view==="team-context" && selClub        && <ClubTeamView data={data} onUpdateData={updateData} club={selClub} team={selTeam} onBack={()=>setView("home")} onNavigate={v=>setView(v)} onOpenSettings={()=>setShowSettings(true)} onOpenBackup={()=>setShowBackup(true)}/>}
        {view==="new-match"    && selClub&&selTeam && <NewMatchView data={data} onUpdateData={updateData} club={selClub} team={selTeam} onBack={()=>setView("team-context")}/>}
        {view==="history"      && selClub&&selTeam && <HistoryView  data={data} club={selClub} team={selTeam} onBack={()=>setView("team-context")} sheetsUrl={sheetsUrl} syncMatch={syncMatch} syncStatus={syncStatus} onSheetsUrlChange={handleSetSheetsUrl} onUpdateData={updateData} onDeleteMatch={deleteMatch}/>}
        {view==="stats"        && selClub&&selTeam && <StatsView    data={data} club={selClub} team={selTeam} onBack={()=>setView("team-context")} sheetsUrl={sheetsUrl} syncAll={syncAll}/>}
      </div>
    </ThemeCtx.Provider>
  );
}



const loadingEl = document.getElementById('loading');
if (loadingEl) loadingEl.style.display = 'none';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
  <script>
  if ('serviceWorker' in navigator) {
    const sw = "\nself.addEventListener('install', e => { self.skipWaiting(); });\nself.addEventListener('activate', e => { self.clients.claim(); });\nself.addEventListener('fetch', e => {\n  e.respondWith(\n    caches.match(e.request).then(cached => {\n      const fresh = fetch(e.request).then(r => {\n        if (r && r.status === 200) {\n          const clone = r.clone();\n          caches.open('live-tracker-v2').then(c => c.put(e.request, clone));\n        }\n        return r;\n      }).catch(() => cached);\n      return cached || fresh;\n    })\n  );\n});\n";
    const blob = new Blob([sw], {type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }
  </script>
