<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Live Tracker"/>
  <meta name="theme-color" content="#020817"/>
  <title>Live Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #020817; font-family: 'DM Sans','Segoe UI',sans-serif; -webkit-tap-highlight-color: transparent; }
    input, button, select { font-family: inherit; }
    #root { min-height: 100vh; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
</head>
<body>
  <div id="root">
    <div id="loading" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#020817;color:#94a3b8;font-family:sans-serif;gap:16px">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#00C896" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="#00C896"/></svg>
      <div style="font-size:14px">Cargando Live Tracker...</div>
    </div>
  </div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('root').innerHTML = '<div style="padding:24px;color:#ef4444;font-family:sans-serif;background:#020817;min-height:100vh"><b>Error:</b><br>' + msg + '<br>Línea: ' + line + '</div>';
    };
  </script>
  <script type="text/babel">
const { useState, useEffect, useCallback, createContext, useContext } = React;

const STORAGE_KEY  = "hockey_stats_v2";
const SETTINGS_KEY = "hockey_settings_v2";
const SHEETS_URL_KEY = "hockey_sheets_url";
const QUARTER_SECONDS = 900;
const PERIODS = ["1er Cuarto","2do Cuarto","3er Cuarto","4to Cuarto"];

const EVENT_TYPES = [
  { id:"ingreso_area",     label:"Ingreso al Area", color:"#3B9EFF" },
  { id:"tiro_arco",        label:"Tiro al Arco",    color:"#A78BFA" },
  { id:"corner",           label:"Corner Corto",    color:"#FBBF24" },
  { id:"gol",              label:"Gol",             color:"#00C896" },
  { id:"penal",            label:"Penal",           color:"#F97316" },
  { id:"tarjeta_verde",    label:"T. Verde",        color:"#22C55E" },
  { id:"tarjeta_amarilla", label:"T. Amarilla",     color:"#EAB308" },
  { id:"tarjeta_roja",     label:"T. Roja",         color:"#EF4444" },
];
const GOL_TYPES     = [{id:"jugada",label:"Jugada"},{id:"corner",label:"Corner"},{id:"penal",label:"Penal"}];
const SHOT_TYPES    = [{id:"jugada",label:"Directo"},{id:"corner",label:"Corner"},{id:"rebote",label:"Rebote"},{id:"desvio",label:"Desvio"}];
const INGRESS_TYPES = [{id:"centro",label:"Centro"},{id:"combinacion",label:"Combinacion"},{id:"desborde",label:"Desborde"},{id:"individual",label:"Individual"}];

const CLUB_COLORS = [
  {id:"red",hex:"#C0392B"},{id:"blue",hex:"#2471A3"},{id:"navy",hex:"#1A3A5C"},
  {id:"green",hex:"#1E8449"},{id:"yellow",hex:"#D4AC0D"},{id:"orange",hex:"#CA6F1E"},
  {id:"purple",hex:"#6C3483"},{id:"white",hex:"#D5D8DC"},{id:"black",hex:"#2C3E50"},{id:"gold",hex:"#B7950B"},
];

const PALETTES = {
  azul:   {id:"azul",  label:"Azul",  bg:"#020817",card:"#0F172A",cardAlt:"#080F1A",border:"#1E293B",borderSt:"#334155",hover:"#1A2744",muted:"#64748B",mutedLo:"#475569",mutedHi:"#94A3B8",text:"#E2E8F0",textSub:"#CBD5E1",tab:"#0A1628"},
  negro:  {id:"negro", label:"Negro", bg:"#000000",card:"#111111",cardAlt:"#0A0A0A",border:"#222222",borderSt:"#333333",hover:"#1A1A1A",muted:"#555555",mutedLo:"#444444",mutedHi:"#888888",text:"#F0F0F0",textSub:"#CCCCCC",tab:"#0D0D0D"},
  verde:  {id:"verde", label:"Verde", bg:"#020D06",card:"#071A0E",cardAlt:"#041009",border:"#0F3018",borderSt:"#1A4D28",hover:"#0D2E18",muted:"#3D6B4A",mutedLo:"#2D5238",mutedHi:"#6B9E7A",text:"#E2F0E8",textSub:"#C5DFD0",tab:"#051408"},
  bordo:  {id:"bordo", label:"Bordo", bg:"#0D0205",card:"#1A0508",cardAlt:"#12030A",border:"#380A12",borderSt:"#5A1020",hover:"#2E0810",muted:"#7A2E3A",mutedLo:"#5C2030",mutedHi:"#B05060",text:"#F0E2E5",textSub:"#DFC8CC",tab:"#100408"},
  carbon: {id:"carbon",label:"Carbon",bg:"#0A0A0C",card:"#15151A",cardAlt:"#0E0E12",border:"#252530",borderSt:"#38383F",hover:"#1E1E26",muted:"#55556A",mutedLo:"#44445A",mutedHi:"#888899",text:"#E8E8F0",textSub:"#CACADC",tab:"#111118"},
};

const ACCENTS = [
  {id:"teal",  label:"Verde agua",hex:"#00C896"},
  {id:"blue",  label:"Azul",      hex:"#3B9EFF"},
  {id:"purple",label:"Violeta",   hex:"#A78BFA"},
  {id:"orange",label:"Naranja",   hex:"#F97316"},
  {id:"pink",  label:"Rosa",      hex:"#F472B6"},
  {id:"yellow",label:"Amarillo",  hex:"#FBBF24"},
];

const FONT_SCALES = {small:1, medium:1.12, large:1.25};
const DEFAULT_SETTINGS = {palette:"azul",accent:"teal",fontScale:"small",iconStyle:"svg"};

const ThemeCtx = React.createContext(null);
const useTheme = () => React.useContext(ThemeCtx);

function generateId() { return Math.random().toString(36).slice(2,9); }

function loadDataSync() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {clubs:[],matches:[]};
    const d = JSON.parse(raw);
    if (d.teams && !d.clubs) {
      return {clubs:[{id:"club_default",name:"Mi Club",color1:"blue",color2:"white",teams:d.teams}],matches:(d.matches||[]).map(m=>({...m,clubId:"club_default"}))};
    }
    const clubs = (d.clubs||[]).map(c=>({...c, teams:(c.teams||[]).map(t=>({...t, tournaments:t.tournaments||[]}))}));
    return {clubs, matches:d.matches||[]};
  } catch(e) { return {clubs:[],matches:[]}; }
}
async function loadDataAsync() { return loadDataSync(); }
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {} }

function loadSettingsSync() {
  try { const raw = localStorage.getItem(SETTINGS_KEY); return raw ? JSON.parse(raw) : null; } catch(e) { return null; }
}
async function loadSettingsAsync() { return loadSettingsSync(); }
function saveSettings(s) { try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch(e) {} }
function getTeamTournaments(data, clubId, teamId) {
  const club = (data.clubs||[]).find(c=>c.id===clubId);
  const team = (club?.teams||[]).find(t=>t.id===teamId);
  return team?.tournaments||[];
}
function loadSheetsUrl() { try { return localStorage.getItem(SHEETS_URL_KEY)||""; } catch(e) { return ""; } }
function saveSheetsUrl(url) { try { localStorage.setItem(SHEETS_URL_KEY, url); } catch(e) {} }

function SvgIcon({id, size, color}) {
  const s = size || 22;
  const c = color || "currentColor";
  if (id==="ingreso_area") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke={c} strokeWidth="1.8"/><path d="M8 12h8M14 9l3 3-3 3" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  if (id==="tiro_arco") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M5 19L19 5M19 5h-6M19 5v6" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/><circle cx="6" cy="18" r="2" fill={c}/></svg>;
  if (id==="corner") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M5 19V5h14" stroke={c} strokeWidth="1.8" strokeLinecap="round"/><rect x="3" y="3" width="3" height="8" rx="1" fill={c}/></svg>;
  if (id==="gol") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke={c} strokeWidth="1.8"/><circle cx="12" cy="12" r="3" fill={c}/></svg>;
  if (id==="penal") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="1.5" stroke={c} strokeWidth="1.8"/><path d="M3 10h18" stroke={c} strokeWidth="1.4"/><circle cx="12" cy="15" r="2.5" stroke={c} strokeWidth="1.6"/></svg>;
  if (id==="tarjeta_verde"||id==="tarjeta_amarilla"||id==="tarjeta_roja") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="6" y="3" width="12" height="18" rx="2" fill={c}/></svg>;
  if (id==="jugada") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M13 3L5 13h7l-1 8 8-10h-7z" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/></svg>;
  if (id==="rebote") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M4 8h16M4 8l4-4M4 8l4 4M20 16H4M20 16l-4-4M20 16l-4 4" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  if (id==="desvio") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M14 5l6 7-6 7M20 12H4" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  if (id==="centro") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>;
  if (id==="combinacion") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="2" fill={c}/><circle cx="19" cy="12" r="2" fill={c}/><circle cx="12" cy="5" r="2" fill={c}/><path d="M7 12h10M12 7v10" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>;
  if (id==="desborde") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M5 19l7-7 7 7M5 5l7 7" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  if (id==="individual") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="7" r="3.5" stroke={c} strokeWidth="1.8"/><path d="M5 20c0-4 3-6 7-6s7 2 7 6" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>;
  if (id==="new_match") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke={c} strokeWidth="1.8"/><path d="M12 8v8M8 12h8" stroke={c} strokeWidth="2" strokeLinecap="round"/></svg>;
  if (id==="history") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke={c} strokeWidth="1.8"/><path d="M7 8h10M7 12h7M7 16h4" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>;
  if (id==="stats") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M4 20V14M9 20V10M14 20V6M19 20V3" stroke={c} strokeWidth="2" strokeLinecap="round"/></svg>;
  if (id==="team") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="8" cy="8" r="3" stroke={c} strokeWidth="1.8"/><circle cx="16" cy="8" r="3" stroke={c} strokeWidth="1.8"/><path d="M2 20c0-3.3 2.7-5 6-5s6 1.7 6 5" stroke={c} strokeWidth="1.8" strokeLinecap="round"/><path d="M16 15c2 0 6 .8 6 5" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>;
  if (id==="settings") return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke={c} strokeWidth="1.8"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>;
  return <svg width={s} height={s} viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill={c} opacity="0.5"/></svg>;
}

function EventIcon({id, size, color}) {
  const {iconStyle, fs} = useTheme();
  const s = size || Math.round(18*fs);
  const EMOJIS = {ingreso_area:"",tiro_arco:"",corner:"",gol:"",penal:"",tarjeta_verde:"",tarjeta_amarilla:"",tarjeta_roja:"",jugada:"",rebote:"",desvio:"",centro:"",combinacion:"",desborde:"",individual:"",new_match:"",history:"",stats:"",team:""};
  if (iconStyle === "emoji") return <span style={{fontSize:s*0.9,lineHeight:1}}>{EMOJIS[id]||"*"}</span>;
  return <SvgIcon id={id} size={s} color={color}/>;
}

function ClubShield({color1, color2, size}) {
  const h = size||40; const w = (size||40)*0.85;
  return (
    <svg width={w} height={h} viewBox="0 0 85 100">
      <defs><clipPath id="shc"><path d="M42.5 2 L80 18 L80 55 Q80 85 42.5 98 Q5 85 5 55 L5 18 Z"/></clipPath></defs>
      <path d="M42.5 2 L80 18 L80 55 Q80 85 42.5 98 Q5 85 5 55 L5 18 Z" fill={color1} stroke="#00000030" strokeWidth="2"/>
      <rect x="42.5" y="0" width="42.5" height="100" fill={color2} clipPath="url(#shc)"/>
      <path d="M42.5 2 L80 18 L80 55 Q80 85 42.5 98 Q5 85 5 55 L5 18 Z" fill="none" stroke="#00000040" strokeWidth="2"/>
    </svg>
  );
}

function SettingsPanel({settings, onSave, onClose}) {
  const [palette,   setPalette]   = useState(settings.palette);
  const [accent,    setAccent]    = useState(settings.accent);
  const [fontScale, setFontScale] = useState(settings.fontScale);
  const [iconStyle, setIconStyle] = useState(settings.iconStyle);
  const p  = PALETTES[palette] || PALETTES.azul;
  const ac = ACCENTS.find(a=>a.id===accent)?.hex || "#00C896";
  const fs = FONT_SCALES[fontScale] || 1;
  const sz = n => Math.round(n*fs);
  const apply = () => { onSave({palette,accent,fontScale,iconStyle}); onClose(); };
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,0.6)"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:p.card,border:"1px solid "+p.border,borderRadius:"20px 20px 0 0",padding:24,width:"100%",maxWidth:600,maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{width:40,height:4,borderRadius:2,background:p.borderSt,margin:"0 auto 20px"}}/>
        <div style={{fontWeight:800,fontSize:sz(18),color:p.text,marginBottom:20}}>Ajustes</div>

        <div style={{marginBottom:20}}>
          <div style={{color:p.mutedHi,fontSize:sz(11),fontWeight:700,letterSpacing:1,marginBottom:10}}>PALETA BASE</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {Object.values(PALETTES).map(pal=>(
              <button key={pal.id} onClick={()=>setPalette(pal.id)} style={{background:pal.card,border:"2px solid "+(palette===pal.id?ac:pal.border),borderRadius:10,padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
                <div style={{display:"flex",gap:3}}><div style={{width:10,height:20,borderRadius:"3px 0 0 3px",background:pal.hover}}/><div style={{width:10,height:20,borderRadius:"0 3px 3px 0",background:pal.mutedHi}}/></div>
                <span style={{color:pal.text,fontSize:sz(12),fontWeight:600}}>{pal.label}</span>
              </button>
            ))}
          </div>
        </div>

        <div style={{marginBottom:20}}>
          <div style={{color:p.mutedHi,fontSize:sz(11),fontWeight:700,letterSpacing:1,marginBottom:10}}>COLOR DE ACENTO</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {ACCENTS.map(a=>(
              <button key={a.id} onClick={()=>setAccent(a.id)} style={{background:a.hex+"22",border:"2px solid "+(accent===a.id?a.hex:p.border),borderRadius:10,padding:"8px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:12,height:12,borderRadius:"50%",background:a.hex}}/>
                <span style={{color:accent===a.id?a.hex:p.mutedHi,fontSize:sz(12),fontWeight:600}}>{a.label}</span>
              </button>
            ))}
          </div>
        </div>

        <div style={{marginBottom:20}}>
          <div style={{color:p.mutedHi,fontSize:sz(11),fontWeight:700,letterSpacing:1,marginBottom:10}}>TAMANO DE TEXTO</div>
          <div style={{display:"flex",gap:8}}>
            {[["small","Chica"],["medium","Mediana"],["large","Grande"]].map(([fid,lbl])=>(
              <button key={fid} onClick={()=>setFontScale(fid)} style={{flex:1,background:fontScale===fid?ac+"22":p.cardAlt,border:"2px solid "+(fontScale===fid?ac:p.border),borderRadius:10,padding:"10px 8px",cursor:"pointer",color:fontScale===fid?ac:p.mutedHi,fontWeight:700,fontSize:sz(13)}}>{lbl}</button>
            ))}
          </div>
        </div>

        <div style={{marginBottom:24}}>
          <div style={{color:p.mutedHi,fontSize:sz(11),fontWeight:700,letterSpacing:1,marginBottom:10}}>ESTILO DE ICONOS</div>
          <div style={{display:"flex",gap:8}}>
            {[["svg","SVG"],["emoji","Emoji"]].map(([iid,lbl])=>(
              <button key={iid} onClick={()=>setIconStyle(iid)} style={{flex:1,background:iconStyle===iid?ac+"22":p.cardAlt,border:"2px solid "+(iconStyle===iid?ac:p.border),borderRadius:10,padding:"12px 8px",cursor:"pointer",color:iconStyle===iid?ac:p.mutedHi,fontWeight:700,fontSize:sz(13)}}>{lbl}</button>
            ))}
          </div>
        </div>

        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,background:p.cardAlt,border:"1px solid "+p.border,borderRadius:12,padding:13,color:p.mutedHi,fontWeight:700,fontSize:sz(14),cursor:"pointer"}}>Cancelar</button>
          <button onClick={apply}   style={{flex:2,background:ac,border:"none",borderRadius:12,padding:13,color:"#fff",fontWeight:800,fontSize:sz(14),cursor:"pointer"}}>Aplicar</button>
        </div>
      </div>
    </div>
  );
}

function SettingsBtn({onClick}) {
  const {p, fs} = useTheme();
  const s = Math.round(36*fs);
  return (
    <button onClick={onClick} style={{background:p.card,border:"1px solid "+p.border,borderRadius:10,width:s,height:s,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <SvgIcon id="settings" size={Math.round(18*fs)} color={p.mutedHi}/>
    </button>
  );
}

function Header({title, onBack}) {
  const {p, fs} = useTheme();
  const sz = n => Math.round(n*fs);
  return (
    <div style={{display:"flex",alignItems:"center",gap:sz(12),marginBottom:sz(28)}}>
      <button onClick={onBack} style={{background:p.border,border:"none",color:p.mutedHi,borderRadius:sz(8),width:sz(36),height:sz(36),cursor:"pointer",fontSize:sz(18),display:"flex",alignItems:"center",justifyContent:"center"}}>&#8249;</button>
      <h2 style={{color:p.text,fontWeight:800,fontSize:sz(22),margin:0}}>{title}</h2>
    </div>
  );
}

function StatCard({value, label, color, sub}) {
  const {p, fs} = useTheme();
  const sz = n => Math.round(n*fs);
  return (
    <div style={{background:p.card,border:"1px solid "+p.border,borderRadius:sz(12),padding:""+sz(14)+"px "+sz(12)+"px",textAlign:"center"}}>
      <div style={{fontWeight:900,fontSize:sz(28),color,lineHeight:1}}>{value}</div>
      <div style={{color:p.mutedHi,fontSize:sz(12),marginTop:sz(4),fontWeight:600}}>{label}</div>
      {sub && <div style={{color:p.mutedLo,fontSize:sz(13),marginTop:sz(3),fontWeight:500}}>{sub}</div>}
    </div>
  );
}

function RelBar({left, right, leftColor, rightColor}) {
  const {p, fs} = useTheme();
  const sz = n => Math.round(n*fs);
  const total = left+right;
  if (total===0) return null;
  const lp = Math.round((left/total)*100);
  return (
    <div style={{background:p.tab,borderRadius:sz(8),padding:""+sz(10)+"px "+sz(14)+"px",display:"flex",alignItems:"center",gap:sz(10)}}>
      <span style={{color:leftColor,fontWeight:700,fontSize:sz(13),minWidth:sz(28),textAlign:"right"}}>{lp}%</span>
      <div style={{flex:1,height:sz(8),borderRadius:sz(4),background:rightColor+"40",overflow:"hidden"}}>
        <div style={{width:lp+"%",height:"100%",background:leftColor,borderRadius:sz(4)}}/>
      </div>
      <span style={{color:rightColor,fontWeight:700,fontSize:sz(13),minWidth:sz(28)}}>{100-lp}%</span>
    </div>
  );
}

function ColorPicker({label, selected, onChange}) {
  const {p, fs} = useTheme();
  const sz = n => Math.round(n*fs);
  return (
    <div>
      <div style={{color:p.mutedHi,fontSize:sz(11),fontWeight:600,marginBottom:sz(8)}}>{label}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {CLUB_COLORS.map(c=>(
          <button key={c.id} onClick={()=>onChange(c.id)} style={{width:sz(26),height:sz(26),borderRadius:6,background:c.hex,border:"2px solid "+(selected===c.id?p.text:"transparent"),cursor:"pointer",flexShrink:0}}/>
        ))}
      </div>
    </div>
  );
}

function ActionCard({svgId, title, subtitle, color, onClick}) {
  const {p, fs} = useTheme();
  const sz = n => Math.round(n*fs);
  return (

}

function ClubTeamView({data, onUpdateData, club, team, onBack, onNavigate, onOpenSettings}) {

  const [managingTeam,  setManagingTeam]  = useState(null); // teamId for tournament mgmt
  const [newTournament, setNewTournament] = useState("");

  const addPlayer    = () => setPlayers(ps=>[...ps,{id:generateId(),name:"",number:""}]);
  const removePlayer = id => setPlayers(ps=>ps.filter(pl=>pl.id!==id));
  const updatePlayer = (id,field,val) => setPlayers(ps=>ps.map(pl=>pl.id===id?{...pl,[field]:val}:pl));

  const saveTeam = () => {
    if (!teamName.trim()) return;
    const vp = players.filter(pl=>pl.name.trim());
    const ut = editTeam ? {...club.teams.find(t=>t.id===editTeam),name:teamName.trim(),players:vp} : {id:generateId(),name:teamName.trim(),players:vp};
    const uts = editTeam ? club.teams.map(t=>t.id===editTeam?ut:t) : [...club.teams,ut];
    onUpdateData({...data,clubs:data.clubs.map(c=>c.id===club.id?{...c,teams:uts}:c)});
    setShowForm(false); setTeamName(""); setPlayers([{id:generateId(),name:"",number:""}]); setEditTeam(null);
  };

  const addTournament = (teamId) => {
    if (!newTournament.trim()) return;

    const clubs = data.clubs.map(c=>c.id===club.id?{...c,teams:c.teams.map(t=>t.id===teamId?{...t,tournaments:[...(t.tournaments||[]),tour]}:t)}:c);

    setNewTournament("");

  const deleteTournament = (teamId, tourId) => {
    const clubs = data.clubs.map(c=>c.id===club.id?{...c,teams:c.teams.map(t=>t.id===teamId?{...t,tournaments:(t.tournaments||[]).filter(tr=>tr.id!==tourId)}:t)}:c);
    onUpdateData({...data,clubs});

            <h2 style={{color:p.text,fontWeight:800,fontSize:sz(20),margin:0}}>Equipos - {club.name}</h2>

        {!showForm ? (
          <>
            <div style={{display:"flex",flexDirection:"column",gap:sz(10),marginBottom:sz(16)}}>
              {club.teams.length===0 && <p style={{color:p.muted,textAlign:"center",padding:""+sz(28)+"px 0"}}>Sin equipos registrados.</p>}
              {club.teams.map(t=>(
                <div key={t.id} style={{background:p.card,border:"1px solid "+p.border,borderRadius:sz(12),padding:""+sz(14)+"px "+sz(18)+"px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontWeight:700,color:p.text,fontSize:sz(14)}}>{t.name}</div>
                    <div style={{color:p.muted,fontSize:sz(12)}}>{t.players.length} jugadoras</div>

                  <div style={{display:"flex",gap:sz(6)}}>
                    <button onClick={()=>setManagingTeam(managingTeam===t.id?null:t.id)} style={{background:"#A78BFA22",border:"1px solid #A78BFA44",color:"#A78BFA",borderRadius:sz(8),padding:"0 "+sz(8)+"px",height:sz(34),cursor:"pointer",fontSize:sz(11),fontWeight:700}}>Torneos</button>
                    <button onClick={()=>startEdit(t)} style={{background:p.border,border:"none",color:p.mutedHi,borderRadius:sz(8),width:sz(34),height:sz(34),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>&#9998;</button>
                    <button onClick={()=>deleteTeam(t.id)} style={{background:"#EF444420",border:"1px solid #EF444440",color:"#EF4444",borderRadius:sz(8),width:sz(34),height:sz(34),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>&#128465;</button>
                  </div>
                </div>
              ))}
            </div>
            {managingTeam && (()=>{

              return (

                    <button onClick={()=>addTournament(t.id)} style={{background:"#A78BFA",border:"none",borderRadius:sz(8),color:"#fff",fontWeight:700,padding:"0 "+sz(12)+"px",cursor:"pointer",fontSize:sz(13)}}>+</button>
                  </div>
                </div>
              );
            })()}
            <button onClick={()=>setShowForm(true)} style={{width:"100%",background:ac,border:"none",borderRadius:sz(12),padding:sz(14),color:"#fff",fontWeight:800,fontSize:sz(15),cursor:"pointer"}}>+ Nuevo Equipo</button>
          </>

          <div style={{display:"flex",flexDirection:"column",gap:sz(16)}}>
            <div>
              <label style={{color:p.mutedHi,fontSize:sz(13),fontWeight:600,display:"block",marginBottom:sz(6)}}>NOMBRE DEL EQUIPO</label>
              <input value={teamName} onChange={e=>setTeamName(e.target.value)} placeholder="Ej: Primera Division" style={{background:p.card,border:"1px solid "+p.border,borderRadius:sz(10),color:p.text,padding:""+sz(12)+"px "+sz(14)+"px",fontSize:sz(14),outline:"none",width:"100%",boxSizing:"border-box"}}/>
            </div>
            <div>
              <label style={{color:p.mutedHi,fontSize:sz(13),fontWeight:600,display:"block",marginBottom:sz(8)}}>JUGADORAS</label>
              {compareList.length >= 2 && (
        <button onClick={()=>setShowCompare(true)}
          style={{width:"100%",background:"#A78BFA",border:"none",borderRadius:sz(12),padding:sz(12),marginBottom:sz(12),color:"#fff",fontWeight:800,fontSize:sz(14),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:sz(8)}}>
          <svg width={sz(16)} height={sz(16)} viewBox="0 0 24 24" fill="none"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          Comparar {compareList.length} partidos seleccionados

      <div style={{display:"flex",flexDirection:"column",gap:sz(8)}}>
                {players.map((pl,i)=>(
                  <div key={pl.id} style={{display:"flex",gap:sz(8),alignItems:"center"}}>

                    <input value={pl.name} onChange={e=>updatePlayer(pl.id,"name",e.target.value)} placeholder={"Jugadora "+(i+1)} style={{background:p.card,border:"1px solid "+p.border,borderRadius:sz(8),color:p.text,padding:sz(10),fontSize:sz(14),outline:"none",flex:1,boxSizing:"border-box"}}/>
                    <button onClick={()=>removePlayer(pl.id)} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:sz(18),padding:"0 "+sz(4)+"px"}}>&#215;</button>
                  </div>
                ))}
              </div>
              <button onClick={addPlayer} style={{marginTop:sz(10),background:"none",border:"1px dashed "+p.borderSt,color:p.muted,borderRadius:sz(8),padding:""+sz(8)+"px "+sz(16)+"px",cursor:"pointer",fontSize:sz(13),width:"100%"}}>+ Agregar jugadora</button>

            </div>
          </div>
        )}
      </div>
    );
  }

  const teamMatches = data.matches.filter(m=>m.teamId===team.id&&m.clubId===club.id);

    <div>

        <ActionCard svgId="stats"     title="Estadisticas Generales" subtitle="Totales, promedios y analisis"    color="#FBBF24"  onClick={()=>onNavigate("stats")}/>
      </div>
    </div>
  );

function formatTime(s) { const m=Math.floor(s/60); return m+":"+(s%60).toString().padStart(2,"0"); }
